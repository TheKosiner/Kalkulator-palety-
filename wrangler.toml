name = "pallet3d"
pages_build_output_dir = "."
compatibility_date = "2024-09-23"

[[d1_databases]]
binding = "DB"
database_name = "pallet3d-db"
database_id = "a94623f1-f288-4dac-88f6-90a47f3443c9"

[vars]
APP_URL    = "https://pallet3d.com"
TRIAL_DAYS = "14"

# Secrets — configure in Cloudflare dashboard or via CLI:
#   wrangler pages secret put JWT_SECRET
#   wrangler pages secret put STRIPE_SECRET_KEY
#   wrangler pages secret put STRIPE_WEBHOOK_SECRET
#   wrangler pages secret put STRIPE_PRICE_ID
