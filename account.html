<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Konto — Pallet3D</title>
  <link rel="icon" type="image/png" href="favicon.png"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#070d1a;--surface:#111a2e;--surface-2:#18233c;
      --border:#1d2a44;--border-2:#2e405f;
      --text:#eef2f8;--text-2:#93a5be;--text-3:#56688a;
      --accent:#3b82f6;--accent-h:#60a5fa;--accent-glow:rgba(59,130,246,.3);
      --green:#34d399;--red:#f87171;--orange:#fbbf24;--r:10px;
    }
    body{font-family:'Inter','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
    a{color:inherit;text-decoration:none}
    nav{height:62px;display:flex;align-items:center;gap:14px;padding:0 24px;border-bottom:1px solid var(--border);background:rgba(7,13,26,.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:10}
    .nav-logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:.95rem;flex:1}
    .nav-logo img{height:26px;width:auto;object-fit:contain}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 20px;border-radius:var(--r);font-size:.86rem;font-weight:700;cursor:pointer;transition:all .18s;border:none;font-family:inherit}
    .btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 16px var(--accent-glow)}
    .btn-primary:hover:not(:disabled){background:var(--accent-h);transform:translateY(-1px)}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed}
    .btn-outline{background:transparent;color:var(--text-2);border:1px solid var(--border-2)}
    .btn-outline:hover{border-color:var(--text-3);color:var(--text)}
    .btn-ghost{background:transparent;color:var(--text-3);border:1px solid var(--border);padding:8px 16px;font-size:.8rem}
    .btn-ghost:hover{color:var(--text-2)}
    main{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 20px}
    .card{background:var(--surface);border:1px solid var(--border-2);border-radius:18px;width:100%;max-width:500px;padding:36px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
    .card-title{font-size:1.4rem;font-weight:800;margin-bottom:4px}
    .card-sub{font-size:.85rem;color:var(--text-2);margin-bottom:28px}
    .info-row{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--border)}
    .info-row:last-of-type{border-bottom:none}
    .info-label{font-size:.79rem;color:var(--text-3);font-weight:500;text-transform:uppercase;letter-spacing:.04em}
    .info-value{font-size:.9rem;font-weight:600}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:.74rem;font-weight:700}
    .b-trial{background:rgba(251,191,36,.12);color:var(--orange);border:1px solid rgba(251,191,36,.3)}
    .b-active{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.3)}
    .b-expired{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.25)}
    .bdot{width:6px;height:6px;border-radius:50%;background:currentColor}
    .actions{display:flex;flex-direction:column;gap:10px;margin-top:28px}
    .alert{padding:12px 16px;border-radius:var(--r);font-size:.85rem;margin-bottom:20px}
    .alert-success{background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.3);color:var(--green)}
    .alert-warn{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);color:var(--orange)}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading{text-align:center;padding:60px 20px;color:var(--text-2)}
    .loading .sp{width:36px;height:36px;border-width:3px;margin:0 auto 16px;display:block}
    @media(max-width:560px){.card{padding:26px 20px}}
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<nav>
  <div class="nav-logo"><img src="logo-full.png" alt="Pallet3D"/></div>
  <a href="app.html"><button id="navCalc" class="btn btn-outline" style="padding:8px 16px;font-size:.82rem">Kalkulator →</button></a>
  <a href="/"><button id="navHome" class="btn btn-ghost">Strona główna</button></a>
</nav>

<main>
  <div class="card" id="card">
    <div class="loading">
      <div class="spinner sp"></div>
      <span id="loadingText">Ładowanie danych konta…</span>
    </div>
  </div>
</main>

<script>
const LANG = localStorage.getItem('lang') === 'en' ? 'en' : 'pl';
document.documentElement.lang = LANG;

const AT = {
  pl: {
    nav_calc: 'Kalkulator →',
    nav_home: 'Strona główna',
    loading: 'Ładowanie danych konta…',
    err_conn: 'Błąd połączenia. Odśwież stronę.',
    badge_trial: 'Okres próbny',
    badge_expired: 'Wygasła',
    badge_active: 'Aktywna',
    badge_past_due: 'Zaległość',
    badge_inactive: 'Nieaktywna',
    alert_success: '✓ Subskrypcja aktywowana — możesz korzystać z kalkulatora!',
    alert_expired: '⚠ Twój dostęp wygasł. Aktywuj subskrypcję, aby kontynuować.',
    card_title: 'Twoje konto',
    card_sub: 'Zarządzaj subskrypcją i rozliczeniami',
    label_name: 'Imię i nazwisko',
    label_email: 'E-mail',
    label_sub: 'Subskrypcja',
    label_status: 'Status',
    btn_open_calc: 'Otwórz kalkulator →',
    btn_portal: 'Zarządzaj fakturowaniem i płatnościami',
    btn_logout: 'Wyloguj się',
    pw_section: 'Zmień hasło',
    pw_current: 'Aktualne hasło',
    pw_new: 'Nowe hasło',
    pw_ph_current: '••••••••',
    pw_ph_new: 'Min. 8 znaków',
    pw_ok: '✓ Hasło zostało zmienione.',
    pw_save: 'Zapisz nowe hasło',
    pw_err_empty: 'Podaj nowe hasło.',
    pw_err_len: 'Hasło musi mieć co najmniej 8 znaków.',
    pw_err_upper: 'Hasło musi zawierać co najmniej jedną wielką literę.',
    pw_err_special: 'Hasło musi zawierać co najmniej jeden znak specjalny.',
    pw_saving: 'Zapisywanie…',
    pw_err_conn: 'Błąd połączenia.',
    pw_err_default: 'Błąd.',
    sub_redirecting: 'Przekierowanie do płatności…',
    sub_err_try: 'Spróbuj ponownie.',
    sub_err_conn: 'Błąd połączenia.',
    portal_opening: 'Otwieranie portalu…',
    portal_err_try: 'Spróbuj ponownie.',
    portal_err_conn: 'Błąd połączenia.',
    err_prefix: 'Błąd: ',
  },
  en: {
    nav_calc: 'Calculator →',
    nav_home: 'Home',
    loading: 'Loading account data…',
    err_conn: 'Connection error. Refresh the page.',
    badge_trial: 'Free trial',
    badge_expired: 'Expired',
    badge_active: 'Active',
    badge_past_due: 'Past due',
    badge_inactive: 'Inactive',
    alert_success: '✓ Subscription activated — you can use the calculator!',
    alert_expired: '⚠ Your access has expired. Activate a subscription to continue.',
    card_title: 'Your account',
    card_sub: 'Manage your subscription and billing',
    label_name: 'Full name',
    label_email: 'E-mail',
    label_sub: 'Subscription',
    label_status: 'Status',
    btn_open_calc: 'Open calculator →',
    btn_portal: 'Manage billing and payments',
    btn_logout: 'Log out',
    pw_section: 'Change password',
    pw_current: 'Current password',
    pw_new: 'New password',
    pw_ph_current: '••••••••',
    pw_ph_new: 'Min. 8 characters',
    pw_ok: '✓ Password changed.',
    pw_save: 'Save new password',
    pw_err_empty: 'Please enter a new password.',
    pw_err_len: 'Password must be at least 8 characters.',
    pw_err_upper: 'Password must contain at least one uppercase letter.',
    pw_err_special: 'Password must contain at least one special character.',
    pw_saving: 'Saving…',
    pw_err_conn: 'Connection error.',
    pw_err_default: 'Error.',
    sub_redirecting: 'Redirecting to payment…',
    sub_err_try: 'Try again.',
    sub_err_conn: 'Connection error.',
    portal_opening: 'Opening portal…',
    portal_err_try: 'Try again.',
    portal_err_conn: 'Connection error.',
    err_prefix: 'Error: ',
  }
};

function at(key) { return ((AT[LANG] || AT.pl)[key]) ?? AT.pl[key] ?? key; }

function pluralDays(n) {
  if (LANG === 'en') return n === 1 ? '1 day' : `${n} days`;
  if (n === 1) return '1 dzień';
  return `${n} dni`;
}

function localSubscribePrice() {
  const loc = (navigator.language || '').toLowerCase();
  if (loc.startsWith('pl') || !loc) return LANG === 'pl' ? '50 zł / mies.' : '50 zł / mo.';
  if (loc.startsWith('en-gb')) return '~£10 / mo.';
  if (loc.startsWith('en-au')) return '~A$20 / mo.';
  if (loc.startsWith('en-ca')) return '~C$18 / mo.';
  if (loc.startsWith('en')) return '~$13 / mo.';
  if (loc.startsWith('cs')) return '~300 Kč / měs.';
  if (loc.startsWith('hu')) return '~5 000 Ft / hó';
  const eur = ['de','fr','it','es','nl','pt','fi','sk','at','be','lu','gr','ie','ee','lv','lt','hr','si','cy','mt'];
  if (eur.some(l => loc.startsWith(l))) return '~€12 / mo.';
  const sek = ['sv','no','da'];
  if (sek.some(l => loc.startsWith(l))) return '~130 kr / mo.';
  return LANG === 'pl' ? '50 zł / mies.' : '50 zł / mo.';
}

// Apply nav translations
document.getElementById('navCalc').textContent = at('nav_calc');
document.getElementById('navHome').textContent = at('nav_home');
const _loadingText = document.getElementById('loadingText');
if (_loadingText) _loadingText.textContent = at('loading');

const params = new URLSearchParams(location.search);

function esc(s) {
  return String(s || '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

async function loadAccount() {
  const card = document.getElementById('card');
  let user;
  try {
    const res = await fetch('/api/auth/me', { credentials: 'include' });
    if (res.status === 401) { location.href = '/?login=1'; return; }
    user = await res.json();
  } catch {
    card.innerHTML = `<p style="color:var(--red);text-align:center;padding:40px 0">${at('err_conn')}</p>`;
    return;
  }

  const sub = user.subscription;
  const dateLocale = LANG === 'en' ? 'en-US' : 'pl-PL';

  let badgeHtml, statusLine;
  if (sub.status === 'trial') {
    if (sub.active) {
      badgeHtml = `<span class="badge b-trial"><span class="bdot"></span>${at('badge_trial')}</span>`;
      statusLine = LANG === 'en'
        ? `<strong>${pluralDays(sub.daysLeft)}</strong> left of free trial`
        : `Pozostało <strong>${pluralDays(sub.daysLeft)}</strong> bezpłatnego okresu próbnego`;
    } else {
      badgeHtml = `<span class="badge b-expired"><span class="bdot"></span>${at('badge_expired')}</span>`;
      statusLine = LANG === 'en' ? 'Trial ended — choose a subscription' : 'Okres próbny zakończony — wybierz subskrypcję';
    }
  } else if (sub.status === 'active') {
    badgeHtml = `<span class="badge b-active"><span class="bdot"></span>${at('badge_active')}</span>`;
    const d = sub.endsAt ? new Date(sub.endsAt * 1000).toLocaleDateString(dateLocale, {day:'numeric',month:'long',year:'numeric'}) : '—';
    statusLine = LANG === 'en' ? `Paid until <strong>${d}</strong>` : `Opłacona do <strong>${d}</strong>`;
  } else if (sub.status === 'past_due') {
    badgeHtml = `<span class="badge b-expired"><span class="bdot"></span>${at('badge_past_due')}</span>`;
    statusLine = LANG === 'en' ? 'Payment failed — update your card details' : 'Płatność nie powiodła się — zaktualizuj dane karty';
  } else {
    badgeHtml = `<span class="badge b-expired"><span class="bdot"></span>${at('badge_inactive')}</span>`;
    statusLine = LANG === 'en' ? 'Subscription inactive' : 'Subskrypcja nieaktywna';
  }

  const successAlert = params.get('success') === '1'
    ? `<div class="alert alert-success">${at('alert_success')}</div>` : '';
  const expiredAlert = params.get('expired') === '1'
    ? `<div class="alert alert-warn">${at('alert_expired')}</div>` : '';

  const showSubscribe = sub.status !== 'active' || !sub.active;
  const showPortal = !!user.subscription?.status && sub.status !== 'trial';

  const subscribePrice = localSubscribePrice();
  const btnSubscribeText = LANG === 'pl'
    ? `Aktywuj subskrypcję — ${subscribePrice}`
    : `Activate subscription — ${subscribePrice}`;

  card.innerHTML = `
    ${successAlert}${expiredAlert}
    <div class="card-title">${at('card_title')}</div>
    <p class="card-sub">${at('card_sub')}</p>
    <div class="info-row">
      <span class="info-label">${at('label_name')}</span>
      <span class="info-value">${esc(user.name)}</span>
    </div>
    <div class="info-row">
      <span class="info-label">${at('label_email')}</span>
      <span class="info-value">${esc(user.email)}</span>
    </div>
    <div class="info-row">
      <span class="info-label">${at('label_sub')}</span>
      <span class="info-value">${badgeHtml}</span>
    </div>
    <div class="info-row" style="border-bottom:none">
      <span class="info-label">${at('label_status')}</span>
      <span class="info-value" style="font-size:.84rem;color:var(--text-2)">${statusLine}</span>
    </div>
    <div class="actions">
      ${sub.active && sub.status === 'active'
        ? `<a href="app.html"><button class="btn btn-primary" style="width:100%">${at('btn_open_calc')}</button></a>` : ''}
      ${showSubscribe
        ? `<button class="btn btn-primary" id="subBtn" onclick="subscribe()" style="width:100%">${btnSubscribeText}</button>` : ''}
      ${showPortal
        ? `<button class="btn btn-outline" id="portalBtn" onclick="managePortal()" style="width:100%">${at('btn_portal')}</button>` : ''}
      <button class="btn btn-ghost" onclick="doLogout()" style="width:100%">${at('btn_logout')}</button>
    </div>
    <div style="margin-top:28px;padding-top:24px;border-top:1px solid var(--border)">
      <div style="font-size:.85rem;font-weight:700;color:var(--text-2);margin-bottom:14px">${at('pw_section')}</div>
      ${user.password_hash !== '' ? `<div style="margin-bottom:10px"><label style="font-size:.79rem;color:var(--text-3);display:block;margin-bottom:4px">${at('pw_current')}</label><input id="pwCurrent" type="password" placeholder="${at('pw_ph_current')}" style="width:100%;padding:9px 12px;background:var(--surface-2);border:1px solid var(--border-2);border-radius:8px;color:var(--text);font-size:.88rem;outline:none;box-sizing:border-box"/></div>` : ''}
      <div style="margin-bottom:10px"><label style="font-size:.79rem;color:var(--text-3);display:block;margin-bottom:4px">${at('pw_new')}</label><input id="pwNew" type="password" placeholder="${at('pw_ph_new')}" style="width:100%;padding:9px 12px;background:var(--surface-2);border:1px solid var(--border-2);border-radius:8px;color:var(--text);font-size:.88rem;outline:none;box-sizing:border-box"/></div>
      <div id="pwErr" style="color:var(--red);font-size:.8rem;margin-bottom:8px;display:none"></div>
      <div id="pwOk" style="color:var(--green);font-size:.8rem;margin-bottom:8px;display:none">${at('pw_ok')}</div>
      <button class="btn btn-outline" id="pwBtn" onclick="changePassword()" style="width:100%">${at('pw_save')}</button>
    </div>
  `;
}

async function subscribe() {
  const btn = document.getElementById('subBtn');
  if (!btn) return;
  const orig = btn.innerHTML;
  btn.innerHTML = `<span class="spinner"></span> ${at('sub_redirecting')}`;
  btn.disabled = true;
  try {
    const res = await fetch('/api/stripe/checkout', { method: 'POST', credentials: 'include' });
    const data = await res.json();
    if (data.url) { location.href = data.url; return; }
    alert(at('err_prefix') + (data.error || at('sub_err_try')));
  } catch { alert(at('sub_err_conn')); }
  btn.innerHTML = orig;
  btn.disabled = false;
}

async function managePortal() {
  const btn = document.getElementById('portalBtn');
  if (!btn) return;
  const orig = btn.innerHTML;
  btn.innerHTML = `<span class="spinner"></span> ${at('portal_opening')}`;
  btn.disabled = true;
  try {
    const res = await fetch('/api/billing/portal', { credentials: 'include' });
    const data = await res.json();
    if (data.url) { location.href = data.url; return; }
    alert(at('err_prefix') + (data.error || at('portal_err_try')));
  } catch { alert(at('portal_err_conn')); }
  btn.innerHTML = orig;
  btn.disabled = false;
}

async function changePassword() {
  const currentEl = document.getElementById('pwCurrent');
  const newEl = document.getElementById('pwNew');
  const errEl = document.getElementById('pwErr');
  const okEl = document.getElementById('pwOk');
  const btn = document.getElementById('pwBtn');
  if (!newEl || !btn) return;
  errEl.style.display = 'none'; okEl.style.display = 'none';
  const newPassword = newEl.value;
  const currentPassword = currentEl ? currentEl.value : '';
  if (!newPassword) { errEl.textContent = at('pw_err_empty'); errEl.style.display = 'block'; return; }
  if (newPassword.length < 8) { errEl.textContent = at('pw_err_len'); errEl.style.display = 'block'; return; }
  if (!/[A-Z]/.test(newPassword)) { errEl.textContent = at('pw_err_upper'); errEl.style.display = 'block'; return; }
  if (!/[!@#$%^&*()\-_=+\[\]{};:\'",.<>/?\\|]/.test(newPassword)) { errEl.textContent = at('pw_err_special'); errEl.style.display = 'block'; return; }
  const orig = btn.textContent; btn.textContent = at('pw_saving'); btn.disabled = true;
  try {
    const res = await fetch('/api/auth/change-password', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ currentPassword, newPassword })
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || at('pw_err_default'); errEl.style.display = 'block'; return; }
    okEl.style.display = 'block';
    newEl.value = ''; if (currentEl) currentEl.value = '';
  } catch { errEl.textContent = at('pw_err_conn'); errEl.style.display = 'block'; }
  btn.textContent = orig; btn.disabled = false;
}

async function doLogout() {
  await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
  location.href = '/';
}

loadAccount();
</script>
</body>
</html>
