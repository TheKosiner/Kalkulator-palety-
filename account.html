<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Konto — Pallet3D</title>
  <link rel="icon" type="image/png" href="logo.png"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#070d1a;--surface:#111a2e;--surface-2:#18233c;
      --border:#1d2a44;--border-2:#2e405f;
      --text:#eef2f8;--text-2:#93a5be;--text-3:#56688a;
      --accent:#3b82f6;--accent-h:#60a5fa;--accent-glow:rgba(59,130,246,.3);
      --green:#34d399;--red:#f87171;--orange:#fbbf24;--r:10px;
    }
    body{font-family:'Inter','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
    a{color:inherit;text-decoration:none}
    nav{height:62px;display:flex;align-items:center;gap:14px;padding:0 24px;border-bottom:1px solid var(--border);background:rgba(7,13,26,.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:10}
    .nav-logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:.95rem;flex:1}
    .nav-logo img{width:30px;height:30px;object-fit:contain}
    .nav-logo b{color:var(--accent-h)}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 20px;border-radius:var(--r);font-size:.86rem;font-weight:700;cursor:pointer;transition:all .18s;border:none;font-family:inherit}
    .btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 16px var(--accent-glow)}
    .btn-primary:hover:not(:disabled){background:var(--accent-h);transform:translateY(-1px)}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed}
    .btn-outline{background:transparent;color:var(--text-2);border:1px solid var(--border-2)}
    .btn-outline:hover{border-color:var(--text-3);color:var(--text)}
    .btn-ghost{background:transparent;color:var(--text-3);border:1px solid var(--border);padding:8px 16px;font-size:.8rem}
    .btn-ghost:hover{color:var(--text-2)}
    main{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 20px}
    .card{background:var(--surface);border:1px solid var(--border-2);border-radius:18px;width:100%;max-width:500px;padding:36px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
    .card-title{font-size:1.4rem;font-weight:800;margin-bottom:4px}
    .card-sub{font-size:.85rem;color:var(--text-2);margin-bottom:28px}
    .info-row{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--border)}
    .info-row:last-of-type{border-bottom:none}
    .info-label{font-size:.79rem;color:var(--text-3);font-weight:500;text-transform:uppercase;letter-spacing:.04em}
    .info-value{font-size:.9rem;font-weight:600}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:.74rem;font-weight:700}
    .b-trial{background:rgba(251,191,36,.12);color:var(--orange);border:1px solid rgba(251,191,36,.3)}
    .b-active{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.3)}
    .b-expired{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.25)}
    .bdot{width:6px;height:6px;border-radius:50%;background:currentColor}
    .actions{display:flex;flex-direction:column;gap:10px;margin-top:28px}
    .alert{padding:12px 16px;border-radius:var(--r);font-size:.85rem;margin-bottom:20px}
    .alert-success{background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.3);color:var(--green)}
    .alert-warn{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);color:var(--orange)}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading{text-align:center;padding:60px 20px;color:var(--text-2)}
    .loading .sp{width:36px;height:36px;border-width:3px;margin:0 auto 16px;display:block}
    @media(max-width:560px){.card{padding:26px 20px}.nav-logo b,.nav-logo img~*:not(b){display:none}}
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<nav>
  <div class="nav-logo"><img src="logo.png" alt=""/>Kalkulator <b>Palety&nbsp;3D</b></div>
  <a href="app.html"><button class="btn btn-outline" style="padding:8px 16px;font-size:.82rem">Kalkulator →</button></a>
  <a href="/"><button class="btn btn-ghost">Strona główna</button></a>
</nav>

<main>
  <div class="card" id="card">
    <div class="loading">
      <div class="spinner sp"></div>
      Ładowanie danych konta…
    </div>
  </div>
</main>

<script>
const params = new URLSearchParams(location.search);

function esc(s) {
  return String(s || '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

function pluralDni(n) {
  if (n === 1) return '1 dzień';
  if (n >= 2 && n <= 4) return `${n} dni`;
  return `${n} dni`;
}

async function loadAccount() {
  const card = document.getElementById('card');
  let user;
  try {
    const res = await fetch('/api/auth/me', { credentials: 'include' });
    if (res.status === 401) { location.href = '/?login=1'; return; }
    user = await res.json();
  } catch {
    card.innerHTML = '<p style="color:var(--red);text-align:center;padding:40px 0">Błąd połączenia. Odśwież stronę.</p>';
    return;
  }

  const sub = user.subscription;

  let badgeHtml, statusLine;
  if (sub.status === 'trial') {
    if (sub.active) {
      badgeHtml = `<span class="badge b-trial"><span class="bdot"></span>Okres próbny</span>`;
      statusLine = `Pozostało <strong>${pluralDni(sub.daysLeft)}</strong> bezpłatnego okresu próbnego`;
    } else {
      badgeHtml = `<span class="badge b-expired"><span class="bdot"></span>Wygasła</span>`;
      statusLine = 'Okres próbny zakończony — wybierz subskrypcję';
    }
  } else if (sub.status === 'active') {
    badgeHtml = `<span class="badge b-active"><span class="bdot"></span>Aktywna</span>`;
    const d = sub.endsAt ? new Date(sub.endsAt * 1000).toLocaleDateString('pl-PL', {day:'numeric',month:'long',year:'numeric'}) : '—';
    statusLine = `Opłacona do <strong>${d}</strong>`;
  } else if (sub.status === 'past_due') {
    badgeHtml = `<span class="badge b-expired"><span class="bdot"></span>Zaległość</span>`;
    statusLine = 'Płatność nie powiodła się — zaktualizuj dane karty';
  } else {
    badgeHtml = `<span class="badge b-expired"><span class="bdot"></span>Nieaktywna</span>`;
    statusLine = 'Subskrypcja nieaktywna';
  }

  const successAlert = params.get('success') === '1'
    ? `<div class="alert alert-success">✓ Subskrypcja aktywowana — możesz korzystać z kalkulatora!</div>` : '';
  const expiredAlert = params.get('expired') === '1'
    ? `<div class="alert alert-warn">⚠ Twój dostęp wygasł. Aktywuj subskrypcję, aby kontynuować.</div>` : '';

  const showSubscribe = sub.status !== 'active' || !sub.active;
  const showPortal = !!user.subscription?.status && sub.status !== 'trial';

  card.innerHTML = `
    ${successAlert}${expiredAlert}
    <div class="card-title">Twoje konto</div>
    <p class="card-sub">Zarządzaj subskrypcją i rozliczeniami</p>
    <div class="info-row">
      <span class="info-label">Imię i nazwisko</span>
      <span class="info-value">${esc(user.name)}</span>
    </div>
    <div class="info-row">
      <span class="info-label">E-mail</span>
      <span class="info-value">${esc(user.email)}</span>
    </div>
    <div class="info-row">
      <span class="info-label">Subskrypcja</span>
      <span class="info-value">${badgeHtml}</span>
    </div>
    <div class="info-row" style="border-bottom:none">
      <span class="info-label">Status</span>
      <span class="info-value" style="font-size:.84rem;color:var(--text-2)">${statusLine}</span>
    </div>
    <div class="actions">
      ${sub.active && sub.status === 'active'
        ? `<a href="app.html"><button class="btn btn-primary" style="width:100%">Otwórz kalkulator →</button></a>` : ''}
      ${showSubscribe
        ? `<button class="btn btn-primary" id="subBtn" onclick="subscribe()" style="width:100%">Aktywuj subskrypcję — 50 zł / mies.</button>` : ''}
      ${showPortal
        ? `<button class="btn btn-outline" id="portalBtn" onclick="managePortal()" style="width:100%">Zarządzaj fakturowaniem i płatnościami</button>` : ''}
      <button class="btn btn-ghost" onclick="doLogout()" style="width:100%">Wyloguj się</button>
    </div>
    <div style="margin-top:28px;padding-top:24px;border-top:1px solid var(--border)">
      <div style="font-size:.85rem;font-weight:700;color:var(--text-2);margin-bottom:14px">Zmień hasło</div>
      ${user.password_hash !== '' ? `<div style="margin-bottom:10px"><label style="font-size:.79rem;color:var(--text-3);display:block;margin-bottom:4px">Aktualne hasło</label><input id="pwCurrent" type="password" placeholder="••••••••" style="width:100%;padding:9px 12px;background:var(--surface-2);border:1px solid var(--border-2);border-radius:8px;color:var(--text);font-size:.88rem;outline:none;box-sizing:border-box"/></div>` : ''}
      <div style="margin-bottom:10px"><label style="font-size:.79rem;color:var(--text-3);display:block;margin-bottom:4px">Nowe hasło</label><input id="pwNew" type="password" placeholder="Min. 8 znaków" style="width:100%;padding:9px 12px;background:var(--surface-2);border:1px solid var(--border-2);border-radius:8px;color:var(--text);font-size:.88rem;outline:none;box-sizing:border-box"/></div>
      <div id="pwErr" style="color:var(--red);font-size:.8rem;margin-bottom:8px;display:none"></div>
      <div id="pwOk" style="color:var(--green);font-size:.8rem;margin-bottom:8px;display:none">✓ Hasło zostało zmienione.</div>
      <button class="btn btn-outline" id="pwBtn" onclick="changePassword()" style="width:100%">Zapisz nowe hasło</button>
    </div>
  `;
}

async function subscribe() {
  const btn = document.getElementById('subBtn');
  if (!btn) return;
  const orig = btn.innerHTML;
  btn.innerHTML = '<span class="spinner"></span> Przekierowanie do płatności…';
  btn.disabled = true;
  try {
    const res = await fetch('/api/stripe/checkout', { method: 'POST', credentials: 'include' });
    const data = await res.json();
    if (data.url) { location.href = data.url; return; }
    alert('Błąd: ' + (data.error || 'Spróbuj ponownie.'));
  } catch { alert('Błąd połączenia.'); }
  btn.innerHTML = orig;
  btn.disabled = false;
}

async function managePortal() {
  const btn = document.getElementById('portalBtn');
  if (!btn) return;
  const orig = btn.innerHTML;
  btn.innerHTML = '<span class="spinner"></span> Otwieranie portalu…';
  btn.disabled = true;
  try {
    const res = await fetch('/api/billing/portal', { credentials: 'include' });
    const data = await res.json();
    if (data.url) { location.href = data.url; return; }
    alert('Błąd: ' + (data.error || 'Spróbuj ponownie.'));
  } catch { alert('Błąd połączenia.'); }
  btn.innerHTML = orig;
  btn.disabled = false;
}

async function changePassword() {
  const currentEl = document.getElementById('pwCurrent');
  const newEl = document.getElementById('pwNew');
  const errEl = document.getElementById('pwErr');
  const okEl = document.getElementById('pwOk');
  const btn = document.getElementById('pwBtn');
  if (!newEl || !btn) return;
  errEl.style.display = 'none'; okEl.style.display = 'none';
  const newPassword = newEl.value;
  const currentPassword = currentEl ? currentEl.value : '';
  if (!newPassword) { errEl.textContent = 'Podaj nowe hasło.'; errEl.style.display = 'block'; return; }
  if (newPassword.length < 8) { errEl.textContent = 'Hasło musi mieć co najmniej 8 znaków.'; errEl.style.display = 'block'; return; }
  if (!/[A-Z]/.test(newPassword)) { errEl.textContent = 'Hasło musi zawierać co najmniej jedną wielką literę.'; errEl.style.display = 'block'; return; }
  if (!/[!@#$%^&*()\-_=+\[\]{};:\'",.<>/?\\|]/.test(newPassword)) { errEl.textContent = 'Hasło musi zawierać co najmniej jeden znak specjalny.'; errEl.style.display = 'block'; return; }
  const orig = btn.textContent; btn.textContent = 'Zapisywanie…'; btn.disabled = true;
  try {
    const res = await fetch('/api/auth/change-password', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ currentPassword, newPassword })
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || 'Błąd.'; errEl.style.display = 'block'; return; }
    okEl.style.display = 'block';
    newEl.value = ''; if (currentEl) currentEl.value = '';
  } catch { errEl.textContent = 'Błąd połączenia.'; errEl.style.display = 'block'; }
  btn.textContent = orig; btn.disabled = false;
}

async function doLogout() {
  await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
  location.href = '/';
}

loadAccount();
</script>
</body>
</html>
