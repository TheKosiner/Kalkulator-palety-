<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kalkulator Palety 3D</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #222;
      min-height: 100vh;
    }

    header {
      background: #1a3c5e;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
    header h1 { font-size: 1.4rem; font-weight: 700; }
    header span { font-size: .85rem; opacity: .7; }

    .layout {
      display: flex;
      gap: 0;
      height: calc(100vh - 60px);
    }

    /* ── LEFT PANEL ── */
    .panel {
      width: 340px;
      min-width: 280px;
      background: #fff;
      border-right: 1px solid #dde2e8;
      overflow-y: auto;
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .section-title {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #7a8394;
      margin-bottom: 6px;
    }

    /* package cards */
    .pkg-card {
      border: 2px solid #e4e8ef;
      border-radius: 10px;
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
      position: relative;
    }
    .pkg-card:hover { border-color: #3a7bd5; box-shadow: 0 2px 8px rgba(58,123,213,.15); }
    .pkg-card.selected { border-color: #1a3c5e; background: #f0f5ff; }

    .pkg-card .pkg-name { font-weight: 700; font-size: .92rem; margin-bottom: 2px; }
    .pkg-card .pkg-dims { font-size: .78rem; color: #5a6272; }
    .pkg-card .pkg-color {
      width: 12px; height: 12px;
      border-radius: 3px;
      position: absolute; top: 12px; right: 12px;
    }

    /* controls */
    label { font-size: .82rem; font-weight: 600; color: #444; display: block; margin-bottom: 4px; }

    input[type=number], select {
      width: 100%;
      padding: 8px 10px;
      border: 1.5px solid #dde2e8;
      border-radius: 7px;
      font-size: .9rem;
      outline: none;
      transition: border-color .15s;
    }
    input[type=number]:focus, select:focus { border-color: #3a7bd5; }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .btn-calc {
      background: #1a3c5e;
      color: #fff;
      border: none;
      border-radius: 9px;
      padding: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
      width: 100%;
    }
    .btn-calc:hover { background: #2a5a8e; }
    .btn-calc:active { transform: scale(.98); }

    /* results */
    .results-box {
      background: #f7f9fc;
      border: 1.5px solid #dde2e8;
      border-radius: 10px;
      padding: 14px;
    }
    .results-box .stat {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 4px 0;
      border-bottom: 1px solid #e8ecf1;
      font-size: .85rem;
    }
    .results-box .stat:last-child { border-bottom: none; }
    .results-box .stat .val { font-weight: 700; color: #1a3c5e; font-size: 1rem; }

    .warn { color: #c0392b; font-size: .78rem; margin-top: 6px; font-style: italic; }

    /* ── 3D VIEW ── */
    .view3d {
      flex: 1;
      position: relative;
      background: #e8ecf3;
    }
    #canvas3d {
      width: 100%;
      height: 100%;
      display: block;
    }

    .legend {
      position: absolute;
      bottom: 14px;
      left: 14px;
      background: rgba(255,255,255,.92);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: .75rem;
      backdrop-filter: blur(4px);
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
      min-width: 160px;
    }
    .legend .l-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
    .legend .l-swatch { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }

    .hint {
      position: absolute;
      top: 10px;
      right: 14px;
      background: rgba(255,255,255,.85);
      border-radius: 7px;
      padding: 7px 12px;
      font-size: .73rem;
      color: #555;
      backdrop-filter: blur(4px);
    }

    .layer-info {
      position: absolute;
      top: 10px;
      left: 14px;
      background: rgba(26,60,94,.88);
      color: #fff;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: .8rem;
      display: none;
    }

    @media (max-width: 700px) {
      .layout { flex-direction: column; height: auto; }
      .panel { width: 100%; border-right: none; border-bottom: 1px solid #dde2e8; }
      .view3d { height: 60vh; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Kalkulator Palety</h1>
    <span>Europaleta 1200 × 800 mm · wizualizacja 3D</span>
  </div>
</header>

<div class="layout">

  <!-- LEFT PANEL -->
  <div class="panel">

    <div>
      <div class="section-title">Wybierz karton</div>
      <div id="pkgList" style="display:flex;flex-direction:column;gap:8px;"></div>
    </div>

    <div>
      <div class="section-title">Parametry</div>

      <div class="row2" style="margin-bottom:12px;">
        <div>
          <label>Ilość paczek</label>
          <input type="number" id="qty" value="20" min="1" max="500" />
        </div>
        <div>
          <label>Max. wys. (mm)</label>
          <input type="number" id="maxH" value="1800" min="100" max="3000" step="50" />
        </div>
      </div>

      <div style="margin-bottom:12px;">
        <label>Orientacja paczki</label>
        <select id="orient">
          <option value="auto">Auto (najlepsze upakowanie)</option>
          <option value="flat">Płasko (H = najm. wymiar)</option>
          <option value="upright">Pionowo (H = najw. wymiar)</option>
        </select>
      </div>

      <button class="btn-calc" onclick="calculate()">Oblicz i wizualizuj</button>
    </div>

    <div class="results-box" id="resultsBox" style="display:none;">
      <div class="section-title" style="margin-bottom:8px;">Wyniki</div>
      <div class="stat"><span>Paczek na palecie</span><span class="val" id="rCount">—</span></div>
      <div class="stat"><span>Warstw</span><span class="val" id="rLayers">—</span></div>
      <div class="stat"><span>Wys. załadunku</span><span class="val" id="rHeight">—</span></div>
      <div class="stat"><span>Paczek w warstwie</span><span class="val" id="rPerLayer">—</span></div>
      <div class="stat"><span>Pozostało (nie zmieściło)</span><span class="val" id="rLeft">—</span></div>
      <div id="warnMsg" class="warn"></div>
    </div>

  </div>

  <!-- 3D VIEW -->
  <div class="view3d">
    <canvas id="canvas3d"></canvas>

    <div class="hint">Mysz: obracaj · Scroll: zoom · PPM: przesuń</div>

    <div class="layer-info" id="layerInfo"></div>

    <div class="legend" id="legend3d" style="display:none;">
      <div style="font-weight:700;margin-bottom:6px;">Legenda</div>
    </div>
  </div>

</div>

<script type="module">
// ─── DATA ────────────────────────────────────────────────────────────────────
const PACKAGES = [
  { id:'rf4',   name:'Karton do RF4',                dims:[770,380,533], color:'#e74c3c' },
  { id:'rp',    name:'Karton RP',                    dims:[770,380,650], color:'#e67e22' },
  { id:'st1',   name:'Karton do stojaka',            dims:[600,195,300], color:'#f1c40f' },
  { id:'st2',   name:'Karton do stojaka (NOWY)',     dims:[770,195,380], color:'#2ecc71' },
  { id:'hst',   name:'Karton do H-standów (NOWY)',   dims:[770,250,700], color:'#1abc9c' },
  { id:'nos',   name:'Karton nosy/sterowniki (NOWY)',dims:[300,300,200], color:'#3498db' },
  { id:'small', name:'Karton na małe części',        dims:[250,150,100], color:'#9b59b6' },
];

// Euro pallet
const PALLET = { W: 1200, D: 800, H: 144 }; // H = pallet board height (mm)

const COLORS = PACKAGES.reduce((o,p) => { o[p.id]=p.color; return o; }, {});

// ─── BUILD PACKAGE CARDS ──────────────────────────────────────────────────────
let selectedId = PACKAGES[0].id;

const list = document.getElementById('pkgList');
PACKAGES.forEach(p => {
  const [w,d,h] = p.dims;
  const card = document.createElement('div');
  card.className = 'pkg-card' + (p.id===selectedId ? ' selected' : '');
  card.dataset.id = p.id;
  card.innerHTML = `
    <div class="pkg-color" style="background:${p.color}"></div>
    <div class="pkg-name">${p.name}</div>
    <div class="pkg-dims">${w} × ${d} × ${h} mm</div>`;
  card.addEventListener('click', () => {
    document.querySelectorAll('.pkg-card').forEach(c=>c.classList.remove('selected'));
    card.classList.add('selected');
    selectedId = p.id;
  });
  list.appendChild(card);
});

// ─── PACKING ALGORITHM ───────────────────────────────────────────────────────
// Returns { count, layers, placements:[{x,y,z,w,d,h}], layerH, perLayer, totalH }

function bestFitInLayer(bw, bd, pw, pd) {
  // Try both orientations and return the one fitting more boxes
  const fit = (bw, bd, pw, pd) => Math.floor(bw/pw) * Math.floor(bd/pd);
  const n1 = fit(bw,bd,pw,pd);
  const n2 = fit(bw,bd,pd,pw); // rotate 90°
  return n1 >= n2 ? [pw,pd] : [pd,pw];
}

function packPallet(pkg, qty, maxH, orientMode) {
  const [ow, od, oh] = pkg.dims; // original dims

  // Generate candidate orientations: [footW, footD, layerH]
  // Sorted by layerH ascending so bigger (heavier) are at bottom
  let candidates = [];
  if (orientMode === 'flat') {
    // smallest dim as height
    const sorted = [...pkg.dims].sort((a,b)=>a-b);
    candidates = [[sorted[2], sorted[1], sorted[0]]];
  } else if (orientMode === 'upright') {
    const sorted = [...pkg.dims].sort((a,b)=>a-b);
    candidates = [[sorted[0], sorted[1], sorted[2]]];
  } else {
    // Auto: try all 3 unique height choices
    const d = pkg.dims;
    const perms = [
      [d[0],d[1],d[2]],
      [d[0],d[2],d[1]],
      [d[1],d[2],d[0]],
    ];
    // deduplicate
    const seen = new Set();
    perms.forEach(p => {
      const k = p.join(',');
      if (!seen.has(k)) { seen.add(k); candidates.push(p); }
    });
  }

  let bestResult = null;

  for (const [fw, fd, lh] of candidates) {
    // choose best footprint orientation for pallet
    const [bfw, bfd] = bestFitInLayer(PALLET.W, PALLET.D, fw, fd);
    const nx = Math.floor(PALLET.W / bfw);
    const ny = Math.floor(PALLET.D / bfd);
    const perLayer = nx * ny;
    if (perLayer === 0) continue;

    const maxLayers = Math.floor((maxH - PALLET.H) / lh);
    if (maxLayers === 0) continue;

    const maxFit = maxLayers * perLayer;
    const placed = Math.min(qty, maxFit);
    const layers = Math.ceil(placed / perLayer);
    const totalH = PALLET.H + layers * lh;

    if (!bestResult || placed > bestResult.count || (placed===bestResult.count && totalH < bestResult.totalH)) {
      // Build placements
      const placements = [];
      let remaining = placed;
      for (let L = 0; L < layers && remaining > 0; L++) {
        const zBase = PALLET.H + L * lh;
        for (let ix = 0; ix < nx && remaining > 0; ix++) {
          for (let iy = 0; iy < ny && remaining > 0; iy++) {
            placements.push({
              x: ix * bfw,
              y: zBase,
              z: iy * bfd,
              w: bfw,
              h: lh,
              d: bfd,
              layer: L,
            });
            remaining--;
          }
        }
      }
      bestResult = { count: placed, layers, placements, layerH: lh, perLayer, totalH, fw: bfw, fd: bfd };
    }
  }

  return bestResult;
}

// ─── CALCULATE ───────────────────────────────────────────────────────────────
let lastResult = null;
let lastPkg    = null;

window.calculate = function() {
  const pkg    = PACKAGES.find(p=>p.id===selectedId);
  const qty    = parseInt(document.getElementById('qty').value)||1;
  const maxH   = parseInt(document.getElementById('maxH').value)||1800;
  const orient = document.getElementById('orient').value;

  const res = packPallet(pkg, qty, maxH, orient);

  lastResult = res;
  lastPkg    = pkg;

  // Show results
  const box = document.getElementById('resultsBox');
  box.style.display = '';
  document.getElementById('rCount').textContent   = res ? res.count : 0;
  document.getElementById('rLayers').textContent  = res ? res.layers : 0;
  document.getElementById('rHeight').textContent  = res ? res.totalH + ' mm' : '—';
  document.getElementById('rPerLayer').textContent= res ? res.perLayer : 0;
  document.getElementById('rLeft').textContent    = res ? (qty - res.count) : qty;

  const warn = document.getElementById('warnMsg');
  if (!res || res.count===0) {
    warn.textContent = 'Paczka nie mieści się w zadanej wysokości!';
  } else if (res.count < qty) {
    warn.textContent = `Tylko ${res.count} z ${qty} paczek zmieściło się w ${maxH} mm.`;
  } else {
    warn.textContent = '';
  }

  draw3D(pkg, res);
  buildLegend(pkg);
};

// ─── 3D RENDERER (pure canvas, no libs) ──────────────────────────────────────
const canvas = document.getElementById('canvas3d');
const ctx    = canvas.getContext('2d');

// Camera state
let camTheta = 0.55;  // horizontal angle (rad)
let camPhi   = 0.42;  // vertical angle (rad)
let camDist  = 4500;
let panX = 0, panY = 0;
let dragging = false, lastMX=0, lastMY=0, isRMB=false;

canvas.addEventListener('mousedown', e=>{
  dragging=true; lastMX=e.clientX; lastMY=e.clientY;
  isRMB = e.button===2;
});
canvas.addEventListener('contextmenu', e=>e.preventDefault());
canvas.addEventListener('mousemove', e=>{
  if(!dragging) return;
  const dx=e.clientX-lastMX, dy=e.clientY-lastMY;
  lastMX=e.clientX; lastMY=e.clientY;
  if(isRMB){ panX+=dx*2; panY+=dy*2; }
  else { camTheta-=dx*0.007; camPhi=Math.max(0.05,Math.min(1.5,camPhi-dy*0.007)); }
  if(lastResult) draw3D(lastPkg, lastResult);
});
canvas.addEventListener('mouseup',   ()=>dragging=false);
canvas.addEventListener('mouseleave',()=>dragging=false);
canvas.addEventListener('wheel', e=>{
  camDist = Math.max(800, Math.min(12000, camDist + e.deltaY*4));
  if(lastResult) draw3D(lastPkg, lastResult);
},{passive:true});

// touch
let t0=null;
canvas.addEventListener('touchstart',e=>{ if(e.touches.length===1){ t0={x:e.touches[0].clientX,y:e.touches[0].clientY}; dragging=true; isRMB=false; }});
canvas.addEventListener('touchmove',e=>{
  if(!dragging||!t0) return;
  const dx=e.touches[0].clientX-t0.x, dy=e.touches[0].clientY-t0.y;
  t0={x:e.touches[0].clientX,y:e.touches[0].clientY};
  camTheta-=dx*0.007; camPhi=Math.max(0.05,Math.min(1.5,camPhi-dy*0.007));
  if(lastResult) draw3D(lastPkg, lastResult);
},{passive:true});
canvas.addEventListener('touchend',()=>{ dragging=false; t0=null; });

// ── projection ─────────────────────────────────────────────────────────────
function project(x, y, z, cx, cy, scale) {
  // isometric-like perspective using spherical camera
  const sinT = Math.sin(camTheta), cosT = Math.cos(camTheta);
  const sinP = Math.sin(camPhi),   cosP = Math.cos(camPhi);

  // rotate around Y axis (theta)
  const rx = x * cosT - z * sinT;
  const ry = y;
  const rz = x * sinT + z * cosT;

  // tilt (phi)
  const fx = rx;
  const fy = ry * cosP - rz * sinP;
  const fz = ry * sinP + rz * cosP;

  // simple perspective
  const fov = camDist;
  const pz  = fz + fov;
  const px  = (fx / pz) * fov * scale + cx + panX;
  const py  = (-fy / pz) * fov * scale + cy + panY;
  return [px, py, fz];
}

function drawFace(pts3, fillColor, strokeColor) {
  if(pts3.length<3) return;
  ctx.beginPath();
  ctx.moveTo(pts3[0][0], pts3[0][1]);
  for(let i=1;i<pts3.length;i++) ctx.lineTo(pts3[i][0], pts3[i][1]);
  ctx.closePath();
  ctx.fillStyle = fillColor;
  ctx.fill();
  ctx.strokeStyle = strokeColor;
  ctx.lineWidth = 0.8;
  ctx.stroke();
}

function lighten(hex, pct) {
  let c = parseInt(hex.slice(1),16);
  let r=(c>>16)&255, g=(c>>8)&255, b=c&255;
  r=Math.min(255,Math.round(r+(255-r)*pct));
  g=Math.min(255,Math.round(g+(255-g)*pct));
  b=Math.min(255,Math.round(b+(255-b)*pct));
  return `rgb(${r},${g},${b})`;
}
function darken(hex, pct) {
  let c = parseInt(hex.slice(1),16);
  let r=(c>>16)&255, g=(c>>8)&255, b=c&255;
  r=Math.round(r*(1-pct));
  g=Math.round(g*(1-pct));
  b=Math.round(b*(1-pct));
  return `rgb(${r},${g},${b})`;
}

function drawBox(x,y,z,w,h,d,color,scale,cx,cy,alpha=1) {
  // 8 corners
  const pts = [
    [x,   y,   z  ],[x+w, y,   z  ],[x+w, y+h, z  ],[x,   y+h, z  ],
    [x,   y,   z+d],[x+w, y,   z+d],[x+w, y+h, z+d],[x,   y+h, z+d],
  ].map(([px,py,pz])=>project(px,py,pz,cx,cy,scale));

  const faceTop    = [pts[3],pts[2],pts[6],pts[7]];
  const faceLeft   = [pts[0],pts[3],pts[7],pts[4]];
  const faceRight  = [pts[1],pts[2],pts[6],pts[5]];
  const faceFront  = [pts[4],pts[5],pts[6],pts[7]];
  const faceBack   = [pts[0],pts[1],pts[2],pts[3]];
  const faceBottom = [pts[0],pts[1],pts[5],pts[4]];

  // sort faces by avg depth
  const avgZ = f => f.reduce((s,p)=>s+p[2],0)/f.length;
  const faces = [
    { pts:faceTop,    fill:lighten(color,.35), stroke:'rgba(0,0,0,.25)' },
    { pts:faceLeft,   fill:lighten(color,.05), stroke:'rgba(0,0,0,.25)' },
    { pts:faceRight,  fill:darken(color,.15),  stroke:'rgba(0,0,0,.25)' },
    { pts:faceFront,  fill:lighten(color,.18), stroke:'rgba(0,0,0,.25)' },
    { pts:faceBack,   fill:darken(color,.25),  stroke:'rgba(0,0,0,.25)' },
    { pts:faceBottom, fill:darken(color,.35),  stroke:'rgba(0,0,0,.25)' },
  ].sort((a,b)=>avgZ(b.pts)-avgZ(a.pts));

  if(alpha<1) ctx.globalAlpha = alpha;
  faces.forEach(f=>drawFace(f.pts,f.fill,f.stroke));
  if(alpha<1) ctx.globalAlpha = 1;
}

// ── pallet mesh ─────────────────────────────────────────────────────────────
function drawPallet(scale,cx,cy){
  const pw=PALLET.W, pd=PALLET.D, ph=PALLET.H;
  const slat=120, gap=60, slath=22;
  const beam=100, beamh=70;

  // top slats
  for(let i=0;i<6;i++){
    drawBox(i*(slat+gap),ph-slath,0,slat,slath,pd,'#c8a86a',scale,cx,cy);
  }
  // bottom boards
  for(let i=0;i<3;i++){
    const bz=[0,pd/2-beam/2,pd-beam];
    drawBox(0,0,bz[i],pw,slath,beam,'#b8965a',scale,cx,cy);
  }
  // blocks
  for(let bi=0;bi<3;bi++){
    const bx=[0,pw/2-50,pw-100];
    const bz=[0,pd/2-50,pd-100];
    drawBox(bx[bi], slath, bz[bi], 100, beamh, 100,'#a07840',scale,cx,cy);
  }
  // long beams
  for(let i=0;i<3;i++){
    const bz=[0,pd/2-40,pd-80];
    drawBox(0, slath+beamh, bz[i], pw, slath, 80, '#b8965a',scale,cx,cy);
  }
}

// ── main draw ────────────────────────────────────────────────────────────────
function draw3D(pkg, res) {
  const W = canvas.parentElement.clientWidth;
  const H = canvas.parentElement.clientHeight;
  canvas.width  = W;
  canvas.height = H;

  ctx.clearRect(0,0,W,H);

  // gradient bg
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#dce5f0'); grad.addColorStop(1,'#b8c8dc');
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);

  if(!res) return;

  // scale: fit pallet+load in ~70% of canvas width
  const maxDim = Math.max(PALLET.W, PALLET.D, res.totalH);
  const scale  = (Math.min(W,H)*0.55) / maxDim;
  const cx = W/2, cy = H/2 + res.totalH*scale*0.1;

  // draw floor shadow
  const shadow = [
    [0,0,0],[PALLET.W,0,0],[PALLET.W,0,PALLET.D],[0,0,PALLET.D]
  ].map(([px,py,pz])=>project(px,py,pz,cx,cy,scale));
  ctx.beginPath();
  ctx.moveTo(shadow[0][0],shadow[0][1]);
  shadow.forEach(p=>ctx.lineTo(p[0],p[1]));
  ctx.closePath();
  ctx.fillStyle='rgba(0,0,0,.15)';
  ctx.fill();

  drawPallet(scale,cx,cy);

  // sort boxes back-to-front
  const sorted = [...res.placements].sort((a,b)=>{
    const [ax,,az]=project(a.x+a.w/2,a.y+a.h/2,a.z+a.d/2,cx,cy,scale);
    const [bx,,bz]=project(b.x+b.w/2,b.y+b.h/2,b.z+b.d/2,cx,cy,scale);
    return bz - az;
  });

  sorted.forEach((p,i) => {
    drawBox(p.x,p.y,p.z,p.w,p.h,p.d,pkg.color,scale,cx,cy);
  });

  // pallet outline (wireframe on top)
  const corners=[
    [0,PALLET.H,0],[PALLET.W,PALLET.H,0],[PALLET.W,PALLET.H,PALLET.D],[0,PALLET.H,PALLET.D]
  ].map(([px,py,pz])=>project(px,py,pz,cx,cy,scale));
  ctx.beginPath();
  corners.forEach((p,i)=>i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1]));
  ctx.closePath();
  ctx.strokeStyle='rgba(0,0,0,.25)'; ctx.lineWidth=1; ctx.stroke();

  // height arrow
  const arrowX = PALLET.W + 80;
  const [ax0,,] = project(arrowX, 0, PALLET.D/2, cx, cy, scale);
  const [ay0]   = project(arrowX, 0, PALLET.D/2, cx, cy, scale);
  const [ax1, ay1] = project(arrowX, res.totalH, PALLET.D/2, cx, cy, scale);
  ctx.beginPath();
  ctx.moveTo(ax0, ay0); ctx.lineTo(ax1, ay1);
  ctx.strokeStyle='#1a3c5e'; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle='#1a3c5e';
  ctx.font='bold 13px Segoe UI';
  ctx.fillText(res.totalH+' mm', ax1+6, (ay0+ay1)/2+5);

  // layer info overlay
  const li = document.getElementById('layerInfo');
  li.style.display='block';
  li.textContent = `Warstwy: ${res.layers} × ${res.layerH} mm = ${res.layers*res.layerH} mm ładunku`;
}

function buildLegend(pkg) {
  const leg = document.getElementById('legend3d');
  leg.style.display='block';
  leg.innerHTML=`<div style="font-weight:700;margin-bottom:6px;">Legenda</div>
    <div class="l-row"><div class="l-swatch" style="background:#c8a86a"></div> Europaleta 1200×800×144 mm</div>
    <div class="l-row"><div class="l-swatch" style="background:${pkg.color}"></div> ${pkg.name} (${pkg.dims.join('×')} mm)</div>`;
}

// initial empty draw
(function init(){
  const W=canvas.parentElement.clientWidth||800;
  const H=canvas.parentElement.clientHeight||600;
  canvas.width=W; canvas.height=H;
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#dce5f0'); grad.addColorStop(1,'#b8c8dc');
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#7a8394';
  ctx.font='16px Segoe UI';
  ctx.textAlign='center';
  ctx.fillText('Wybierz karton i kliknij „Oblicz i wizualizuj"', W/2, H/2);
  ctx.textAlign='start';
})();
</script>
