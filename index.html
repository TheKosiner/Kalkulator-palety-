<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Kalkulator Palety 3D</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--navy:#1a3c5e;--blue:#3a7bd5;--peek:44px}
    html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;background:#1a3c5e;color:#222}

    /* HEADER */
    header{position:fixed;top:0;left:0;right:0;height:50px;background:var(--navy);color:#fff;display:flex;align-items:center;padding:0 16px;gap:10px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.4)}
    header h1{font-size:1.05rem;font-weight:700;flex:1}
    header .sub{font-size:.68rem;opacity:.6;white-space:nowrap}

    /* CANVAS */
    #view3d{position:fixed;top:50px;left:0;right:0;bottom:0;background:#c0d2e4;touch-action:none}
    #canvas3d{width:100%;height:100%;display:block;touch-action:none}

    /* OVERLAYS */
    .ov{position:absolute;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border-radius:10px}
    #statsBar{top:10px;left:10px;right:10px;background:rgba(26,60,94,.83);color:#fff;padding:8px 12px;display:none;flex-wrap:wrap;gap:4px 14px;font-size:.76rem}
    #statsBar .s{display:flex;flex-direction:column;align-items:center;min-width:50px}
    #statsBar .s .v{font-size:1.1rem;font-weight:800;line-height:1.1}
    #statsBar .s .l{font-size:.58rem;opacity:.72;text-transform:uppercase;letter-spacing:.04em}
    #hintBar{bottom:10px;right:10px;background:rgba(255,255,255,.76);color:#444;padding:6px 10px;font-size:.63rem}
    #warnBar{bottom:52px;left:10px;right:10px;background:rgba(192,57,43,.88);color:#fff;padding:7px 12px;font-size:.78rem;font-weight:600;display:none;text-align:center}

    /* DRAWER */
    #drawer{position:fixed;left:0;right:0;bottom:0;background:#fff;border-radius:18px 18px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.22);z-index:200;transition:transform .32s cubic-bezier(.4,0,.2,1);transform:translateY(calc(100% - var(--peek)))}
    #drawer.open{transform:translateY(0)}
    #handle{height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;gap:8px;color:#555;font-size:.82rem;font-weight:600;flex-shrink:0;position:relative}
    #handle .pip{width:36px;height:4px;border-radius:2px;background:#ccc;position:absolute;top:10px}
    #handle .chev{font-size:.9rem;transition:transform .25s}
    #drawer.open #handle .chev{transform:rotate(180deg)}
    #drawerContent{overflow-y:auto;padding:0 16px 32px;max-height:75vh}

    /* PANEL ELEMENTS */
    .stitle{font-size:.65rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:#8a93a2;margin:12px 0 6px}

    /* PACKAGE CARDS – stacked list on mobile, 2-col on desktop */
    .pkg-item{border:2px solid #e4e8ef;border-radius:11px;padding:9px 10px;margin-bottom:7px;cursor:pointer;transition:border-color .15s,background .15s;display:flex;align-items:center;gap:10px}
    .pkg-item:hover{border-color:var(--blue)}
    .pkg-item.selected{border-color:var(--navy);background:#eef3ff}
    .pkg-dot{width:14px;height:14px;border-radius:4px;flex-shrink:0}
    .pkg-info{flex:1;min-width:0}
    .pkg-name{font-size:.8rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .pkg-dim{font-size:.65rem;color:#7a8394}
    .pkg-qty-wrap{display:none;align-items:center;gap:4px;flex-shrink:0}
    .pkg-item.selected .pkg-qty-wrap{display:flex}
    .pkg-qty-wrap label{font-size:.65rem;color:#555;white-space:nowrap;margin:0}
    .pkg-qty{width:62px;padding:5px 6px;border:1.5px solid #dde2e8;border-radius:7px;font-size:.85rem;text-align:center;outline:none}
    .pkg-qty:focus{border-color:var(--blue)}

    /* CONTROLS */
    .ctrl-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
    .ctrl-full{margin-bottom:10px}
    label.lbl{font-size:.78rem;font-weight:600;color:#444;display:block;margin-bottom:3px}
    input[type=number],select{width:100%;padding:9px 10px;border:1.5px solid #dde2e8;border-radius:8px;font-size:.9rem;outline:none}
    input[type=number]:focus,select:focus{border-color:var(--blue)}
    .btn-calc{background:var(--navy);color:#fff;border:none;border-radius:11px;padding:13px;font-size:1rem;font-weight:700;cursor:pointer;width:100%;margin-top:4px;letter-spacing:.02em}
    .btn-calc:active{opacity:.85;transform:scale(.98)}

    /* MIXED MODE TOGGLE */
    .mode-tabs{display:flex;border:1.5px solid #dde2e8;border-radius:9px;overflow:hidden;margin-bottom:12px}
    .mode-tab{flex:1;padding:8px;text-align:center;font-size:.78rem;font-weight:600;cursor:pointer;background:#f7f9fc;color:#666;border:none;transition:background .15s,color .15s}
    .mode-tab.active{background:var(--navy);color:#fff}

    /* LEGEND */
    #legend{position:absolute;bottom:10px;left:10px;background:rgba(255,255,255,.88);border-radius:10px;padding:8px 12px;font-size:.7rem;backdrop-filter:blur(4px);box-shadow:0 2px 8px rgba(0,0,0,.12);display:none;max-width:220px}
    #legend .lr{display:flex;align-items:center;gap:7px;margin:3px 0}
    #legend .ls{width:13px;height:13px;border-radius:3px;flex-shrink:0}

    /* CAM CONTROLS */
    #camCtrls{position:absolute;right:10px;bottom:52px;display:flex;flex-direction:column;gap:7px;z-index:10}
    .cam-btn{width:42px;height:42px;border-radius:50%;border:none;background:rgba(255,255,255,.86);backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);font-size:1.15rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.22);color:#1a3c5e;font-weight:700;line-height:1}
    .cam-btn:active{transform:scale(.88)}

    /* PER-PKG ORIENT */
    .pkg-orient-wrap{display:none;flex-shrink:0}
    .pkg-orient{width:76px;padding:4px 3px;border:1.5px solid #dde2e8;border-radius:7px;font-size:.7rem;outline:none;background:#fff}
    .pkg-orient:focus{border-color:var(--blue)}

    /* MANUAL MODE */
    #manualPanel .pkg-item{cursor:pointer}
    #manualPanel .pkg-item.selected{border-color:var(--navy);background:#eef3ff}
    .man-face-btns{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
    .man-face-btn{padding:7px 10px;border:1.5px solid #dde2e8;border-radius:8px;font-size:.72rem;cursor:pointer;background:#f7f9fc;color:#444;text-align:left;width:100%}
    .man-face-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
    .man-face-btn:active{opacity:.8}
    .man-action-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
    .btn-man{border:none;border-radius:10px;padding:11px;font-size:.88rem;font-weight:700;cursor:pointer;width:100%}
    .btn-undo{background:#e8edf4;color:#1a3c5e}
    .btn-clear{background:#fdecea;color:#c0392b}
    #manHint{position:absolute;top:60px;left:50%;transform:translateX(-50%);background:rgba(26,60,94,.82);color:#fff;padding:6px 14px;border-radius:20px;font-size:.75rem;font-weight:600;pointer-events:none;white-space:nowrap;display:none}
    .btn-fill{background:#e8f4fd;color:#1565c0}
    .btn-remove{background:#fdecea;color:#c0392b}
    .btn-remove.active{background:#c0392b;color:#fff}

    /* PKG EDIT / ADD */
    .pkg-edit-btn{background:none;border:none;cursor:pointer;color:#c0c8d4;font-size:.92rem;padding:3px 5px;flex-shrink:0;border-radius:5px;line-height:1}
    .pkg-edit-btn:hover{color:var(--navy);background:#eef3ff}
    .btn-add-pkg{display:block;width:100%;margin-top:5px;padding:9px 10px;border:1.5px dashed #c5ccd8;border-radius:10px;background:none;color:#5a7ea0;font-size:.8rem;font-weight:600;cursor:pointer;letter-spacing:.02em;text-align:center}
    .btn-add-pkg:hover{border-color:var(--blue);color:var(--blue);background:#f4f8ff}

    /* PACKAGE EDIT MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:500;display:flex;align-items:flex-end;justify-content:center}
    .modal-overlay.hidden{display:none}
    .modal-box{background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:480px;padding:22px 20px 36px;animation:slideUp .2s ease}
    @keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
    .modal-title{font-size:1rem;font-weight:800;color:var(--navy);margin-bottom:15px}
    .modal-row{margin-bottom:11px}
    .modal-row label{font-size:.75rem;font-weight:600;color:#555;display:block;margin-bottom:4px}
    .modal-row input[type=text],.modal-row input[type=number]{width:100%;padding:9px 10px;border:1.5px solid #dde2e8;border-radius:8px;font-size:.9rem;outline:none}
    .modal-row input:focus{border-color:var(--blue)}
    .modal-dims{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .modal-color-row{display:flex;align-items:center;gap:12px}
    .modal-color-row input[type=color]{width:44px;height:38px;padding:2px 3px;border:1.5px solid #dde2e8;border-radius:8px;cursor:pointer;background:#fff;flex-shrink:0}
    .modal-btns{display:flex;gap:8px;margin-top:16px}
    .btn-modal-save{flex:1;background:var(--navy);color:#fff;border:none;border-radius:10px;padding:12px;font-size:.93rem;font-weight:700;cursor:pointer}
    .btn-modal-del{background:#fdecea;color:#c0392b;border:none;border-radius:10px;padding:12px;font-size:.93rem;font-weight:700;cursor:pointer}
    .btn-modal-del.hidden{display:none}
    .btn-modal-cancel{background:#f0f2f5;color:#555;border:none;border-radius:10px;padding:12px;font-size:.93rem;font-weight:600;cursor:pointer}
    .modal-restore{font-size:.7rem;color:#8a93a2;margin-top:10px;text-align:center;cursor:pointer;text-decoration:underline}
    @media(min-width:760px){.modal-overlay{align-items:center}.modal-box{border-radius:16px;max-width:400px}}

    /* DESKTOP */
    @media(min-width:760px){
      html,body{overflow:auto}
      #view3d{left:360px}
      #drawer{position:fixed;left:0;top:50px;bottom:0;width:360px;border-radius:0;transform:none!important;box-shadow:2px 0 12px rgba(0,0,0,.12);display:flex;flex-direction:column}
      #handle{display:none}
      #drawerContent{flex:1;overflow-y:auto;max-height:none;padding:14px 16px 24px}
      #statsBar{top:10px;left:10px;right:auto;min-width:260px}
      #legend{bottom:10px;left:10px}
    }
  </style>
</head>
<body>

<header>
  <h1>Kalkulator Palety 3D</h1>
  <span class="sub">Europaleta 1200×800 mm</span>
</header>

<div id="view3d">
  <canvas id="canvas3d"></canvas>
  <div class="ov" id="statsBar">
    <div class="s"><span class="v" id="rTotal">—</span><span class="l">Paczek</span></div>
    <div class="s"><span class="v" id="rLayers">—</span><span class="l">Warstw</span></div>
    <div class="s"><span class="v" id="rHeight">—</span><span class="l">Wys. mm</span></div>
    <div class="s" id="sPerLayer" style="display:none"><span class="v" id="rPerLayer">—</span><span class="l">/ warstwę</span></div>
    <div class="s"><span class="v" id="rLeft">—</span><span class="l">Zostało</span></div>
  </div>
  <div class="ov" id="warnBar"></div>
  <div class="ov" id="hintBar">Dotyk: obracaj · 2 palce: zoom</div>
  <div id="legend"></div>
  <div id="manHint">Dotknij palety aby postawić karton</div>
  <div id="camCtrls">
    <button class="cam-btn" title="Zbliż" onclick="camZoomIn()">+</button>
    <button class="cam-btn" title="Oddal" onclick="camZoomOut()">−</button>
    <button class="cam-btn" title="Obróć lewo" onclick="camRotL()">◀</button>
    <button class="cam-btn" title="Obróć prawo" onclick="camRotR()">▶</button>
    <button class="cam-btn" title="Reset widoku" onclick="camReset()">⟳</button>
  </div>
</div>

<div id="drawer">
  <div id="handle" onclick="toggleDrawer()">
    <div class="pip"></div>
    <span id="handleLabel">Wybierz kartony &amp; oblicz</span>
    <span class="chev">▲</span>
  </div>

  <div id="drawerContent">

    <!-- MODE TABS -->
    <div class="stitle">Tryb</div>
    <div class="mode-tabs">
      <button class="mode-tab active" id="tabSingle" onclick="setMode('single')">Jeden typ</button>
      <button class="mode-tab"        id="tabMixed"  onclick="setMode('mixed')">Mieszane</button>
      <button class="mode-tab"        id="tabManual" onclick="setMode('manual')">Ręcznie</button>
    </div>

    <!-- AUTO PACKAGES (single / mixed) -->
    <div id="autoPanel">
      <div class="stitle">Kartony</div>
      <div id="pkgList"></div>
      <button class="btn-add-pkg" onclick="openPkgModal(null)">+ Dodaj nowy karton</button>
    </div>

    <!-- MANUAL PANEL -->
    <div id="manualPanel" style="display:none">
      <div class="stitle">Karton do ułożenia</div>
      <div id="manPkgList"></div>
      <div class="stitle">Ściana na dole</div>
      <div class="man-face-btns" id="manFaceBtns"></div>
      <div class="stitle">Parametry</div>
      <div class="ctrl-full">
        <label class="lbl">Max. wysokość (mm)</label>
        <input type="number" id="manMaxH" value="1800" min="200" max="3500" step="50" inputmode="numeric"/>
      </div>
      <div class="man-action-row">
        <button class="btn-man btn-undo" onclick="manUndo()">↩ Cofnij</button>
        <button class="btn-man btn-clear" onclick="manClear()">🗑 Wyczyść</button>
      </div>
      <div class="man-action-row" style="margin-top:6px">
        <button class="btn-man btn-fill"   onclick="manAutoFill()">⬛ Wypełnij</button>
        <button class="btn-man btn-remove" id="btnRemove" onclick="manToggleRemove()">✕ Usuń</button>
      </div>
    </div>

    <!-- PARAMS (auto modes) -->
    <div id="autoParams">
    <div class="stitle">Parametry</div>
    <div class="ctrl-row" id="singleQtyRow">
      <div>
        <label class="lbl">Ilość paczek</label>
        <input type="number" id="qty" value="20" min="1" max="999" inputmode="numeric"/>
      </div>
      <div>
        <label class="lbl">Max. wysokość (mm)</label>
        <input type="number" id="maxH" value="1800" min="200" max="3500" step="50" inputmode="numeric"/>
      </div>
    </div>
    <div class="ctrl-full" id="mixedMaxHRow" style="display:none">
      <label class="lbl">Max. wysokość palety (mm)</label>
      <input type="number" id="maxHMixed" value="1800" min="200" max="3500" step="50" inputmode="numeric"/>
    </div>
    <div class="ctrl-full" id="globalOrientRow">
      <label class="lbl">Bok zawsze na górze</label>
      <select id="orient">
        <option value="auto">Auto (najlepsze upakowanie)</option>
      </select>
    </div>
    <div class="ctrl-full">
      <label class="lbl">Margines bezpieczeństwa (mm / stronę)</label>
      <input type="number" id="margin" value="0" min="0" max="200" step="5" inputmode="numeric"/>
    </div>

    <button class="btn-calc" onclick="calculate()">Oblicz i wizualizuj</button>
    </div><!-- /autoParams -->
  </div>
</div>

<!-- PACKAGE EDIT / CREATE MODAL -->
<div class="modal-overlay hidden" id="pkgModal" onclick="modalBgClick(event)">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle">Nowy karton</div>
    <div class="modal-row">
      <label>Nazwa</label>
      <input type="text" id="mName" placeholder="np. Karton XL" maxlength="48"/>
    </div>
    <div class="modal-row">
      <label>Wymiary (mm) &mdash; Długość &times; Szerokość &times; Wysokość</label>
      <div class="modal-dims">
        <input type="number" id="mDimA" placeholder="Dług." min="1" max="9999" inputmode="numeric"/>
        <input type="number" id="mDimB" placeholder="Szer." min="1" max="9999" inputmode="numeric"/>
        <input type="number" id="mDimC" placeholder="Wys."  min="1" max="9999" inputmode="numeric"/>
      </div>
    </div>
    <div class="modal-row">
      <label>Kolor etykiety</label>
      <div class="modal-color-row">
        <input type="color" id="mColor" value="#3498db"
               oninput="document.getElementById('mColorHex').textContent=this.value"/>
        <span id="mColorHex" style="font-size:.82rem;color:#555;font-family:monospace">#3498db</span>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-modal-save"            onclick="modalSave()">Zapisz</button>
      <button class="btn-modal-del hidden" id="modalDelBtn" onclick="modalDelete()">Usuń</button>
      <button class="btn-modal-cancel"          onclick="modalClose()">Anuluj</button>
    </div>
    <div class="modal-restore" id="modalRestoreRow" style="display:none"
         onclick="modalRestoreDefaults()">Przywróć domyślne kartony</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════
const DEFAULT_PKGS = [
  { id:'rf4',   name:'Karton do RF4',            dims:[770,380,533], color:'#e74c3c' },
  { id:'rp',    name:'Karton RP',                dims:[770,380,650], color:'#e67e22' },
  { id:'st1',   name:'Karton stojak',            dims:[600,195,300], color:'#c9a800' },
  { id:'st2',   name:'Karton stojak (NOWY)',     dims:[770,195,380], color:'#27ae60' },
  { id:'hst',   name:'Karton H-stand (NOWY)',    dims:[770,250,700], color:'#16a085' },
  { id:'nos',   name:'Nosy/Sterowniki (NOWY)',   dims:[300,300,200], color:'#2980b9' },
  { id:'small', name:'Karton małe części',       dims:[250,150,100], color:'#8e44ad' },
];
const BUILTIN_IDS = new Set(DEFAULT_PKGS.map(p=>p.id));

function savePkgs() { try{localStorage.setItem('pkgs',JSON.stringify(PKGS));}catch(e){} }
function loadPkgsFromStorage() {
  try {
    const raw = localStorage.getItem('pkgs');
    if (raw) { const p=JSON.parse(raw); if(Array.isArray(p)&&p.length) return p; }
  } catch(e) {}
  return DEFAULT_PKGS.map(p=>({...p, dims:[...p.dims]}));
}
let PKGS = loadPkgsFromStorage();
const PAL = { W:1200, D:800, H:144 };

// ═══════════════════════════════════════════════════════
// MODE & DRAWER
// ═══════════════════════════════════════════════════════
let mode = 'single'; // 'single' | 'mixed' | 'manual'
let drawerOpen = false;

function setMode(m) {
  mode = m;
  ['Single','Mixed','Manual'].forEach(t =>
    document.getElementById('tab'+t).classList.toggle('active', m===t.toLowerCase()));
  const isMan = m==='manual';
  document.getElementById('autoPanel').style.display   = isMan ? 'none' : '';
  document.getElementById('autoParams').style.display  = isMan ? 'none' : '';
  document.getElementById('manualPanel').style.display = isMan ? '' : 'none';
  document.getElementById('manHint').style.display     = isMan ? 'block' : 'none';
  document.getElementById('singleQtyRow').style.display   = m==='single' ? '' : 'none';
  document.getElementById('mixedMaxHRow').style.display   = m==='mixed'  ? '' : 'none';
  document.getElementById('sPerLayer').style.display      = m==='single' ? '' : 'none';
  document.getElementById('globalOrientRow').style.display = m==='single' ? '' : 'none';
  // Rebuild pkg list so qty/orient wrap visibility matches the new mode
  buildPkgList();
  if (m==='single') {
    const pkg = PKGS.find(p=>selectedIds.has(p.id));
    if (pkg) rebuildOrientSelect(pkg);
  }
  if (isMan) {
    manRefreshFaceBtns();
    const r = buildManualRes();
    lastRes=r; lastMode='manual';
    buildLegend(r,'manual');
    updateManStats(r);
    draw3D(r);
  }
}

function toggleDrawer() {
  drawerOpen = !drawerOpen;
  document.getElementById('drawer').classList.toggle('open', drawerOpen);
}
// swipe handle
let sy0=null;
document.getElementById('handle').addEventListener('touchstart',e=>{sy0=e.touches[0].clientY;},{passive:true});
document.getElementById('handle').addEventListener('touchend',e=>{
  if(sy0===null) return;
  const dy=sy0-e.changedTouches[0].clientY;
  if(Math.abs(dy)>20){ drawerOpen=dy>0; document.getElementById('drawer').classList.toggle('open',drawerOpen); }
  sy0=null;
},{passive:true});

// ═══════════════════════════════════════════════════════
// PACKAGE LIST  (rebuilt whenever PKGS changes or mode switches)
// ═══════════════════════════════════════════════════════
let selectedIds = new Set([PKGS[0]?.id || '']);

// Rebuild the auto-mode package list from scratch.
function buildPkgList() {
  const list = document.getElementById('pkgList');
  list.innerHTML = '';
  // Preserve qty/orient values across rebuilds
  const savedQtys   = new Map();
  const savedOrients = new Map();
  document.querySelectorAll('.pkg-qty').forEach(el   => savedQtys.set(el.dataset.id,   el.value));
  document.querySelectorAll('.pkg-orient').forEach(el => savedOrients.set(el.dataset.id, el.value));

  PKGS.forEach(p => {
    const isSel  = selectedIds.has(p.id);
    const showMixed = mode==='mixed' && isSel;
    const [A,B,C] = p.dims;
    const item = document.createElement('div');
    item.className = 'pkg-item' + (isSel ? ' selected' : '');
    item.dataset.id = p.id;
    item.innerHTML = `
      <div class="pkg-dot" style="background:${p.color}"></div>
      <div class="pkg-info">
        <div class="pkg-name">${p.name}</div>
        <div class="pkg-dim">${A}×${B}×${C} mm</div>
      </div>
      <button class="pkg-edit-btn" title="Edytuj" tabindex="-1">✏️</button>
      <div class="pkg-orient-wrap" style="display:${showMixed?'flex':'none'}">

function manSurfAt(x,z,fw,fd) {
  let h=PAL.H;
  for(const b of manBoxes)
    if(b.x<x+fw&&b.x+b.w>x&&b.z<z+fd&&b.z+b.d>z) h=Math.max(h,b.y+b.h);

}

function manPlace(wx,wz) {
  const {fw,fd,lh} = manGetDims();
  const maxH = parseInt(document.getElementById('manMaxH').value)||1800;
  const GRID = 50;
  wx = Math.round(wx/GRID)*GRID;
  wz = Math.round(wz/GRID)*GRID;
  wx = Math.max(0, Math.min(PAL.W-fw, wx));
  wz = Math.max(0, Math.min(PAL.D-fd, wz));
  const wy = manSurfAt(wx,wz,fw,fd);
  if (wy+lh > maxH) return;
  manBoxes.push({x:wx,y:wy,z:wz,w:fw,h:lh,d:fd,pkgId:manSelPkg.id,color:manSelPkg.color});

// Inverse perspective projection — screen (sx,sy) → world (x,z) on plane y=y0
function unprojectY(sx, sy, y0, W, H, sc) {
  const p   = camDist*sc, cx=W/2, cy=H/2;
  const dx  = sx - cx - panX;
  const dy  = -(sy - cy - panY);
  const Y   = y0 - camTargetY;
  const sT=Math.sin(camTheta),cT=Math.cos(camTheta);
  const sP=Math.sin(camPhi),  cP=Math.cos(camPhi);
  if(Math.abs(sP)<0.01) return null;
  const denom = 1 + dy*cP/(p*sP);
  if(Math.abs(denom)<1e-4) return null;
  const pz  = (Y/sP + camDist) / denom;
  const fy  = dy*pz/p;
  const Rz  = (Y*cP - fy)/sP;
  const Rx  = dx*pz/p;
  return { x: Rx*cT + Rz*sT + PAL.W/2,
           z:-Rx*sT + Rz*cT + PAL.D/2 };
}

function manEventToWorld(e) {

  const sc=(Math.min(W,H)*(window.innerWidth<760?.75:.7))/Math.max(PAL.W,PAL.D,totalH);

  const cl=e.changedTouches?e.changedTouches[0]:e;
  const sx=cl.clientX-rect.left, sy=cl.clientY-rect.top;

}

}

// Auto-fill: pack as many more of the selected box as possible into the

window.manAutoFill = () => {

  const maxH = parseInt(document.getElementById('manMaxH').value)||1800;

  _placed = manBoxes.map(b=>({x:b.x,y:b.y,z:b.z,w:b.w,h:b.h,d:b.d}));

// ═══════════════════════════════════════════════════════
// PACKING ALGORITHM
// ═══════════════════════════════════════════════════════
function bestFit(palW, palD, fw, fd) {
  const n1 = Math.floor(palW/fw)*Math.floor(palD/fd);
  const n2 = Math.floor(palW/fd)*Math.floor(palD/fw);
  return n1>=n2 ? [fw,fd] : [fd,fw];
}

function orientCandidates(dims, orientMode) {
  const d=dims;
  if (orientMode==='flat') {
    const s=[...d].sort((a,b)=>a-b);
    return [[s[2],s[1],s[0]]];
  }
  if (orientMode==='upright') {
    const s=[...d].sort((a,b)=>a-b);
    return [[s[0],s[1],s[2]]];
  }
  // '0','1','2' = fix top/bottom face (same as face-down since faces are parallel)
  const fi = parseInt(orientMode);
  if (!isNaN(fi) && fi>=0 && fi<=2)
    return [[[d[0],d[1],d[2]],[d[0],d[2],d[1]],[d[1],d[2],d[0]]][fi]];
  // 'auto': try all unique orientations
  const seen=new Set(), out=[];
  [[d[0],d[1],d[2]],[d[0],d[2],d[1]],[d[1],d[2],d[0]]].forEach(p=>{
    const k=p.join(','); if(!seen.has(k)){seen.add(k);out.push(p);}
  });
  return out;
}

function bestOrientation(dims, orientMode) {
  // Optimise for perLayer/lh (boxes per mm of height) → minimum stack height
  let best=null;
  for(const [fw,fd,lh] of orientCandidates(dims,orientMode)){
    const [bfw,bfd]=bestFit(PAL.W,PAL.D,fw,fd);
    const nx=Math.floor(PAL.W/bfw), ny=Math.floor(PAL.D/bfd);
    const perLayer=nx*ny; if(!perLayer) continue;
    const density=perLayer/lh;
    if(!best||density>best.density) best={fw:bfw,fd:bfd,lh,nx,ny,perLayer,density};
  }
  return best;
}

// SINGLE-TYPE pack
function packSingle(pkg, qty, maxH, orientMode, margin=0) {
  const m2 = margin * 2;
  let best=null;
  for(const [fw0,fd0,lh0] of orientCandidates(pkg.dims, orientMode)){
    const fw=fw0+m2, fd=fd0+m2, lh=lh0+m2; // effective dims with margin
    const [bfw,bfd]=bestFit(PAL.W,PAL.D,fw,fd);
    const nx=Math.floor(PAL.W/bfw), ny=Math.floor(PAL.D/bfd);
    const perLayer=nx*ny; if(!perLayer) continue;
    const maxL=Math.floor((maxH-PAL.H)/lh); if(!maxL) continue;
    const placed=Math.min(qty,maxL*perLayer);
    const layers=Math.ceil(placed/perLayer);
    const totalH=PAL.H+layers*lh;
    if(!best||placed>best.count||(placed===best.count&&totalH<best.totalH)){
      const placements=[], groups=[{pkgId:pkg.id,color:pkg.color,layers:[]}];
      let rem=placed;
      for(let L=0;L<layers&&rem>0;L++){
        const yBase=PAL.H+L*lh;
        groups[0].layers.push({layer:L,y:yBase,h:lh0});
        for(let ix=0;ix<nx&&rem>0;ix++)
          for(let iy=0;iy<ny&&rem>0;iy++){
            // render at original dims, offset by margin within the slot
            placements.push({x:ix*bfw+margin,y:yBase+margin,z:iy*bfd+margin,w:fw0,h:lh0,d:fd0,pkgId:pkg.id,color:pkg.color});
            rem--;
          }
      }
      best={count:placed,layers,placements,layerH:lh0,perLayer,totalH,groups};
    }
  }
  return best;
}

// MIXED-TYPE pack — 3D heightmap bin-packing
//
// Uses a surface height map so boxes can sit NEXT TO each other (not just
// stacked in uniform layers). No-levitation guaranteed: a box is only placed
// where its entire footprint has a flat, uniformly supported surface below it.
// Sorts by volume desc so the heaviest/largest types go to the bottom first.

let _placed = []; // working set: {x,y,z,w,h,d}

// Maximum surface height under footprint (x..x+fw, z..z+fd)
function _maxSurf(x, z, fw, fd) {
  let h = PAL.H;
  for (const b of _placed)
    if (b.x < x+fw && b.x+b.w > x && b.z < z+fd && b.z+b.d > z)
      h = Math.max(h, b.y + b.h);
  return h;
}

// True iff every sub-rectangle under the footprint has surface height === reqH
// (i.e., the footprint is fully supported and flat at reqH – no floating)
function _isFlat(x, z, fw, fd, reqH) {
  if (x + fw > PAL.W || z + fd > PAL.D) return false;
  // Build breakpoints from overlapping box edges to avoid sampling inside a box
  const xs = new Set([x, x+fw]);
  const zs = new Set([z, z+fd]);
  for (const b of _placed) {
    if (b.x < x+fw && b.x+b.w > x && b.z < z+fd && b.z+b.d > z) {
      [b.x, b.x+b.w].forEach(v => { if (v > x && v < x+fw) xs.add(v); });
      [b.z, b.z+b.d].forEach(v => { if (v > z && v < z+fd) zs.add(v); });
    }
  }
  const sX = [...xs].sort((a,b)=>a-b);
  const sZ = [...zs].sort((a,b)=>a-b);
  for (let i = 0; i < sX.length-1; i++)
    for (let j = 0; j < sZ.length-1; j++) {
      // Check midpoint of each sub-rectangle
      let ph = PAL.H;
      const px = (sX[i]+sX[i+1])/2, pz = (sZ[j]+sZ[j+1])/2;
      for (const b of _placed)
        if (px >= b.x && px < b.x+b.w && pz >= b.z && pz < b.z+b.d)
          ph = Math.max(ph, b.y+b.h);
      if (ph !== reqH) return false;
    }
  return true;
}

// Find the lowest flat position for a box fw×fd×lh within maxH.
// Primary sort: lowest y (fill bottom first).
// Secondary sort: box centre closest to pallet centre (avoid edge towers).
function _findPos(fw, fd, lh, maxH) {
  const xs = new Set([0]), zs = new Set([0]);
  for (const b of _placed) {
    xs.add(b.x); xs.add(b.x+b.w);
    zs.add(b.z); zs.add(b.z+b.d);
  }
  const pcx = PAL.W/2, pcz = PAL.D/2;
  let best = null;
  for (const x of xs) {
    if (x + fw > PAL.W) continue;
    for (const z of zs) {
      if (z + fd > PAL.D) continue;
      const y = _maxSurf(x, z, fw, fd);
      if (y + lh > maxH) continue;
      if (!_isFlat(x, z, fw, fd, y)) continue;
      const dc = Math.hypot(x + fw/2 - pcx, z + fd/2 - pcz);
      if (!best || y < best.y || (y === best.y && dc < best.dc))
        best = {x, y, z, dc};
    }
  }
  return best;
}

// Returns [fw, fd, lh] candidates for a given "face down" selection.
// faceMode: 'auto' | '0' | '1' | '2'
//   '0' → dims[0]×dims[1] on bottom, height = dims[2]
//   '1' → dims[0]×dims[2] on bottom, height = dims[1]
//   '2' → dims[1]×dims[2] on bottom, height = dims[0]
function faceDownCandidates(dims) {
  const [A,B,C] = dims;
  return [
    [A, B, C],
    [A, C, B],
    [B, C, A],
  ];
}

// Generate all unique orientations for a package (up to 6):
// 3 face-down choices × 2 footprint rotations.
// Returns [[fw, fd, lh, fw0, fd0, lh0], ...]
// fw/fd/lh = effective dims (with 2*margin padding); fw0/fd0/lh0 = visual dims.
function genOrients(dims, faceMode, margin) {
  const m2 = (margin || 0) * 2;
  const allFaces = faceDownCandidates(dims);
  const facesToTry = faceMode === 'auto'
    ? allFaces
    : [allFaces[parseInt(faceMode)]].filter(Boolean);
  const seen = new Set(), out = [];
  for (const [fw0, fd0, lh0] of facesToTry) {
    for (const [w, d] of [[fw0, fd0], [fd0, fw0]]) {
      const key = `${w},${d},${lh0}`;
      if (seen.has(key)) continue;
      seen.add(key);
      out.push([w + m2, d + m2, lh0 + m2, w, d, lh0]);
    }
  }
  return out;
}

// Guillotine-Cut bin-packing for a single horizontal layer (2-D problem on palW × palD).
// items : [{fw, fd, lh, fw0, fd0, lh0, pkgId, color}, ...]  — all same effective lh
// qtysLeft : Map<pkgId, remaining_qty>  — read-only; a local copy is used internally
// Returns array of placements {x, z, fw, fd, lh, fw0, fd0, lh0, pkgId, color}.
function _guillotineLayer(palW, palD, items, qtysLeft) {
  let freeRects = [{x: 0, z: 0, w: palW, d: palD}];
  const placements = [];
  const layerQty = new Map(qtysLeft); // local copy — never mutates the caller's map

  while (true) {
    // Best Area Fit: find (item, free-rect) pair with minimum leftover area
    let bestScore = Infinity, bestItem = null, bestRectIdx = -1;
    for (const item of items) {
      if ((layerQty.get(item.pkgId) || 0) <= 0) continue;
      for (let ri = 0; ri < freeRects.length; ri++) {
        const r = freeRects[ri];
        if (item.fw <= r.w && item.fd <= r.d) {
          const score = r.w * r.d - item.fw * item.fd;
          if (score < bestScore) { bestScore = score; bestItem = item; bestRectIdx = ri; }
        }
      }
    }
    if (bestItem === null) break; // nothing fits

    const r = freeRects[bestRectIdx];
    placements.push({
      x: r.x, z: r.z,
      fw: bestItem.fw, fd: bestItem.fd, lh: bestItem.lh,
      fw0: bestItem.fw0, fd0: bestItem.fd0, lh0: bestItem.lh0,
      pkgId: bestItem.pkgId, color: bestItem.color
    });
    layerQty.set(bestItem.pkgId, layerQty.get(bestItem.pkgId) - 1);

    // Guillotine split: try both H-split and V-split; keep the one whose
    // larger resulting piece is bigger (maximises usable space).
    const fw = bestItem.fw, fd = bestItem.fd;
    const hR = {x: r.x+fw, z: r.z,    w: r.w-fw, d: fd      }; // H-split: right of item
    const hT = {x: r.x,    z: r.z+fd, w: r.w,    d: r.d-fd  }; // H-split: above item
    const vR = {x: r.x+fw, z: r.z,    w: r.w-fw, d: r.d     }; // V-split: right of item
    const vT = {x: r.x,    z: r.z+fd, w: fw,     d: r.d-fd  }; // V-split: above item
    const hMax = Math.max(hR.w*hR.d, hT.w*hT.d);
    const vMax = Math.max(vR.w*vR.d, vT.w*vT.d);
    freeRects.splice(bestRectIdx, 1,
      ...((hMax >= vMax) ? [hR, hT] : [vR, vT]).filter(rec => rec.w > 0 && rec.d > 0));
  }
  return placements;
}

// Layer-based mixed-type packing using Guillotine Cut.
//
// Each layer has a single, uniform height. For every iteration we:
//   1. Collect all 6 orientations of every remaining package type.
//   2. For each candidate layer height, simulate a Guillotine layer.
//   3. Pick the height that maximises (total box volume) / (layer height mm) —
//      this metric naturally puts larger/heavier boxes at the bottom.
//   4. Commit the chosen layer and advance currentY.
//
// Signature and return value are identical to the old packMixed so nothing
// else in the project needs to change.
function packMixed(entries, maxH, pkgOrientMap, margin=0) {
  const placements = [];
  const groupMap   = new Map();
  const leftover   = [];
  const qtysLeft   = new Map(entries.map(({pkg, qty}) => [pkg.id, qty]));

  for (const {pkg, qty} of entries)
    groupMap.set(pkg.id, {color: pkg.color, name: pkg.name, placed: 0, qty});

  let currentY = PAL.H;

  while (currentY < maxH) {
    // Build orientation list for all package types with remaining quantity
    const allOrients = [];
    for (const {pkg} of entries) {
      if ((qtysLeft.get(pkg.id) || 0) <= 0) continue;
      const faceMode = pkgOrientMap.get(pkg.id) || 'auto';
      for (const [fw, fd, lh, fw0, fd0, lh0] of genOrients(pkg.dims, faceMode, margin))
        allOrients.push({fw, fd, lh, fw0, fd0, lh0, pkgId: pkg.id, color: pkg.color});
    }
    if (allOrients.length === 0) break;

    // Unique effective heights that still fit within maxH
    const heights = [...new Set(allOrients.map(o => o.lh))].filter(h => currentY + h <= maxH);
    if (heights.length === 0) break;

    // Evaluate each candidate height; choose best by volume-per-mm density
    let bestLh = null, bestResult = null, bestDensity = -1;
    for (const lh of heights) {
      const layerItems = allOrients.filter(o => o.lh === lh);
      const placed = _guillotineLayer(PAL.W, PAL.D, layerItems, qtysLeft);
      if (placed.length === 0) continue;
      const vol = placed.reduce((s, p) => s + p.fw0 * p.fd0 * p.lh0, 0);
      const density = vol / lh; // mm²  — bigger boxes → higher score → placed first
      if (density > bestDensity) { bestDensity = density; bestLh = lh; bestResult = placed; }
    }
    if (!bestResult) break;

    // Commit the chosen layer
    for (const p of bestResult) {
      placements.push({
        x: p.x + margin, y: currentY + margin, z: p.z + margin,
        w: p.fw0, h: p.lh0, d: p.fd0, pkgId: p.pkgId, color: p.color
      });
      qtysLeft.set(p.pkgId, (qtysLeft.get(p.pkgId) || 0) - 1);
      groupMap.get(p.pkgId).placed++;
    }
    currentY += bestLh;
  }

  for (const {pkg} of entries) {
    const rem = qtysLeft.get(pkg.id) || 0;
    if (rem > 0) leftover.push({pkg, qty: rem});
  }

  const totalH = placements.reduce((m, p) => Math.max(m, p.y + p.h), PAL.H);
  return {
    count: placements.length,
    layers: new Set(placements.map(p => p.y)).size,
    placements, totalH,
    groups: [...groupMap.entries()].map(([pkgId, g]) => ({pkgId, ...g, layers: []})),
    leftover,
  };
}

// packMixed is now self-optimising (tries all 6 orientations, all heights, Guillotine).
// packMixedOptimal is kept for call-site compatibility.
function packMixedOptimal(entries, maxH, pkgOrientMap, margin) {
  return packMixed(entries, maxH, pkgOrientMap, margin);
}

// ═══════════════════════════════════════════════════════
// PACKAGE MODAL (add / edit)
// ═══════════════════════════════════════════════════════
let _modalEditId = null; // null = new package, string = editing existing

function openPkgModal(id) {
  _modalEditId = id || null;
  const isNew = !id;
  const pkg = id ? PKGS.find(p=>p.id===id) : null;

  document.getElementById('modalTitle').textContent = isNew ? 'Nowy karton' : 'Edytuj karton';
  document.getElementById('mName').value  = pkg?.name  || '';
  document.getElementById('mDimA').value  = pkg?.dims[0] || '';
  document.getElementById('mDimB').value  = pkg?.dims[1] || '';
  document.getElementById('mDimC').value  = pkg?.dims[2] || '';
  const color = pkg?.color || '#3498db';
  document.getElementById('mColor').value    = color;
  document.getElementById('mColorHex').textContent = color;

  // Show delete button only for custom (non-built-in) packages
  const delBtn = document.getElementById('modalDelBtn');
  delBtn.classList.toggle('hidden', isNew || BUILTIN_IDS.has(id));

  // Show "restore defaults" hint when editing
  document.getElementById('modalRestoreRow').style.display = isNew ? 'none' : 'block';

  document.getElementById('pkgModal').classList.remove('hidden');
  setTimeout(()=>document.getElementById('mName').focus(), 50);
}

function modalClose() {
  document.getElementById('pkgModal').classList.add('hidden');
  _modalEditId = null;
}

function modalBgClick(e) {
  if (e.target === document.getElementById('pkgModal')) modalClose();
}

function modalSave() {
  const name = document.getElementById('mName').value.trim();
  const A = parseInt(document.getElementById('mDimA').value);
  const B = parseInt(document.getElementById('mDimB').value);
  const C = parseInt(document.getElementById('mDimC').value);
  const color = document.getElementById('mColor').value;

  if (!name)          { alert('Podaj nazwę kartonu.'); return; }
  if (!A||!B||!C||A<=0||B<=0||C<=0) { alert('Podaj prawidłowe wymiary (mm > 0).'); return; }

  if (_modalEditId) {
    // Edit existing
    const pkg = PKGS.find(p=>p.id===_modalEditId);
    if (pkg) { pkg.name=name; pkg.dims=[A,B,C]; pkg.color=color; }
  } else {
    // New custom package
    PKGS.push({ id:'pkg_'+Date.now(), name, dims:[A,B,C], color });
  }
  savePkgs();
  modalClose();
  _afterPkgsChanged();
}

function modalDelete() {
  const id = _modalEditId;
  if (!id || BUILTIN_IDS.has(id)) return;
  if (!confirm('Usunąć ten karton?')) return;
  PKGS = PKGS.filter(p=>p.id!==id);
  selectedIds.delete(id);
  if (!selectedIds.size && PKGS.length) selectedIds.add(PKGS[0].id);
  savePkgs();
  modalClose();
  _afterPkgsChanged();
}

function modalRestoreDefaults() {
  if (!confirm('Przywrócić wszystkie domyślne kartony i usunąć własne?')) return;
  PKGS = DEFAULT_PKGS.map(p=>({...p, dims:[...p.dims]}));
  selectedIds = new Set([PKGS[0].id]);
  savePkgs();
  modalClose();
  _afterPkgsChanged();
}

// Called after any mutation of PKGS — rebuilds all UI lists
function _afterPkgsChanged() {
  buildPkgList();
  buildManPkgList();
  // Make sure manSelPkg is still valid
  if (!PKGS.find(p=>p.id===manSelPkg?.id)) {
    manSelPkg = PKGS[0];
    manFaceIdx = 0; manFlipped = false;
  }
  manRefreshFaceBtns();
  // Refresh orient select if in single mode
  if (mode==='single') {
    const pkg = PKGS.find(p=>selectedIds.has(p.id));
    if (pkg) rebuildOrientSelect(pkg);
  }
  // Re-render if there's an active result
  if (lastRes && lastMode==='manual') {
    const r=buildManualRes(); lastRes=r;
    buildLegend(r,'manual'); updateManStats(r); draw3D(r);
  }
}

// ═══════════════════════════════════════════════════════
// CALCULATE
// ═══════════════════════════════════════════════════════
let lastRes=null, lastMode=null;

window.calculate=function(){
  const orientMode=document.getElementById('orient').value;
  const margin=parseInt(document.getElementById('margin').value)||0;
  let res, warns=[];

  if(mode==='single'){
    if(!selectedIds.size){alert('Zaznacz karton!');return;}
    const pkgId=[...selectedIds][0];
    const pkg=PKGS.find(p=>p.id===pkgId);
    const qty=parseInt(document.getElementById('qty').value)||1;
    const maxH=parseInt(document.getElementById('maxH').value)||1800;
    res=packSingle(pkg,qty,maxH,orientMode,margin);
    if(!res||res.count===0) warns.push('Paczka nie mieści się w podanej wysokości!');
    else if(res.count<qty) warns.push(`Tylko ${res.count} z ${qty} paczek zmieściło się.`);
    document.getElementById('rTotal').textContent=res?res.count:0;
    document.getElementById('rLayers').textContent=res?res.layers:0;
    document.getElementById('rHeight').textContent=res?res.totalH:'—';
    document.getElementById('rPerLayer').textContent=res?res.perLayer:0;
    document.getElementById('sPerLayer').style.display='';
    document.getElementById('rLeft').textContent=res?(qty-res.count):qty;
  } else {
    if(!selectedIds.size){alert('Zaznacz przynajmniej jeden karton!');return;}
    const maxH=parseInt(document.getElementById('maxHMixed').value)||1800;
    const entries=[];
    const pkgOrientMap=new Map();
    let totalReq=0;
    selectedIds.forEach(id=>{
      const pkg=PKGS.find(p=>p.id===id);
      const qtyEl=document.querySelector(`.pkg-qty[data-id="${id}"]`);
      const orientEl=document.querySelector(`.pkg-orient[data-id="${id}"]`);
      const qty=parseInt(qtyEl?.value)||0;
      if(qty<=0) return; // skip types with 0 quantity
      pkgOrientMap.set(id, orientEl?.value||'auto');
      entries.push({pkg,qty});
      totalReq+=qty;
    });
    res=packMixedOptimal(entries,maxH,pkgOrientMap,margin);
    document.getElementById('rTotal').textContent=res.count;
    document.getElementById('rLayers').textContent=res.layers;
    document.getElementById('rHeight').textContent=res.totalH;
    document.getElementById('sPerLayer').style.display='none';
    document.getElementById('rLeft').textContent=totalReq-res.count;
    if(res.leftover?.length){
      warns.push('Nie zmieściło się: '+res.leftover.map(l=>`${l.pkg.name} ×${l.qty}`).join(', '));
    }
  }

  const sb=document.getElementById('statsBar');
  sb.style.display='flex';
  const wb=document.getElementById('warnBar');
  if(warns.length){ wb.textContent=warns.join(' | '); wb.style.display='block'; }
  else wb.style.display='none';

  lastRes=res; lastMode=mode;
  buildLegend(res,mode);
  if(window.innerWidth<760&&drawerOpen) toggleDrawer();
  draw3D(res);
};

// ═══════════════════════════════════════════════════════
// 3D ENGINE
// ═══════════════════════════════════════════════════════
const canvas=document.getElementById('canvas3d');
const ctx=canvas.getContext('2d');
let camTheta=0.52,camPhi=0.45,camDist=3800,panX=0,panY=0;
let camTargetY=PAL.H/2; // vertical focal point; updated each draw

// mouse
let drag=false,lmx=0,lmy=0,rmb=false,tapStart=null;
canvas.addEventListener('mousedown',e=>{
  drag=true;lmx=e.clientX;lmy=e.clientY;rmb=e.button===2;
  tapStart={x:e.clientX,y:e.clientY};
});
canvas.addEventListener('contextmenu',e=>e.preventDefault());
canvas.addEventListener('mousemove',e=>{
  if(mode==='manual' && !drag){
    if(manRemoveMode){
      const {W,H,sc}=manScreenSc(); const cx=W/2,cy=H/2;
      const rect=canvas.getBoundingClientRect();
      const sx=e.clientX-rect.left, sy=e.clientY-rect.top;
      let best=-1, bd=50;
      for(let i=0;i<manBoxes.length;i++){
        const b=manBoxes[i];
        const [px,py]=proj(b.x+b.w/2,b.y+b.h/2,b.z+b.d/2,cx,cy,sc);
        const d=Math.hypot(px-sx,py-sy);
        if(d<bd){bd=d;best=i;}
      }
      manHoverRemoveIdx=best;
    } else {
      const w=manHoverToWorld(e);
      if(w){const {fw,fd}=manGetDims();const G=50;
        manGhostX=Math.max(0,Math.min(PAL.W-fw,Math.round(w.x/G)*G));
        manGhostZ=Math.max(0,Math.min(PAL.D-fd,Math.round(w.z/G)*G));
      } else { manGhostX=null; }
    }
    if(lastRes)draw3D(lastRes); return;
  }
  if(!drag)return;
  const dx=e.clientX-lmx,dy=e.clientY-lmy;lmx=e.clientX;lmy=e.clientY;
  if(rmb){panX+=dx*1.8;panY+=dy*1.8;}
  else{camTheta-=dx*.007;camPhi=Math.max(.05,Math.min(1.5,camPhi-dy*.007));}
  if(lastRes)draw3D(lastRes);
});
canvas.addEventListener('mouseup',e=>{
  if(mode==='manual' && tapStart && !rmb){
    const moved=Math.hypot(e.clientX-tapStart.x,e.clientY-tapStart.y);
    if(moved<6){
      if(manRemoveMode){
        const i=manPickBox(e);
        if(i>=0){manBoxes.splice(i,1);manHoverRemoveIdx=-1;const r=buildManualRes();lastRes=r;lastMode='manual';buildLegend(r,'manual');updateManStats(r);draw3D(r);}
      } else { const w=manEventToWorld(e); if(w) manPlace(w.x,w.z); }
    }
  }
  drag=false; tapStart=null;
});
canvas.addEventListener('mouseleave',()=>{drag=false; if(mode==='manual'){manGhostX=null;if(lastRes)draw3D(lastRes);}});
canvas.addEventListener('wheel',e=>{camDist=Math.max(600,Math.min(10000,camDist+e.deltaY*3.5));if(lastRes)draw3D(lastRes);},{passive:true});

// touch
let tpts={},pinch0=null,tTapStart=null;
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t=>tpts[t.identifier]={x:t.clientX,y:t.clientY});
  if(e.touches.length===1) tTapStart={x:e.touches[0].clientX,y:e.touches[0].clientY};
  if(e.touches.length===2){const[a,b]=[e.touches[0],e.touches[1]];pinch0=Math.hypot(b.clientX-a.clientX,b.clientY-a.clientY);}
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===2){
    const[a,b]=[e.touches[0],e.touches[1]];
    const d=Math.hypot(b.clientX-a.clientX,b.clientY-a.clientY);
    if(pinch0){camDist=Math.max(600,Math.min(10000,camDist*(pinch0/d)));pinch0=d;}
  } else if(e.touches.length===1){
    const t=e.touches[0],pr=tpts[t.identifier];
    if(pr){const dx=t.clientX-pr.x,dy=t.clientY-pr.y;
      camTheta-=dx*.007;camPhi=Math.max(.05,Math.min(1.5,camPhi-dy*.007));
    }
    tpts[t.identifier]={x:t.clientX,y:t.clientY};
  }
  if(lastRes)draw3D(lastRes);
},{passive:false});
canvas.addEventListener('touchend',e=>{
  if(mode==='manual' && e.touches.length===0 && tTapStart){
    const t=e.changedTouches[0];
    const moved=Math.hypot(t.clientX-tTapStart.x,t.clientY-tTapStart.y);
    if(moved<12){
      if(manRemoveMode){
        const i=manPickBox(e);
        if(i>=0){manBoxes.splice(i,1);manHoverRemoveIdx=-1;const r=buildManualRes();lastRes=r;lastMode='manual';buildLegend(r,'manual');updateManStats(r);draw3D(r);}
      } else { const w=manEventToWorld(e); if(w) manPlace(w.x,w.z); }
    }
  }
  Array.from(e.changedTouches).forEach(t=>delete tpts[t.identifier]);
  if(e.touches.length<2)pinch0=null;
  if(e.touches.length===0)tTapStart=null;
},{passive:true});

// projection — orbit centre is the geometric centre of the scene in all 3 axes
function proj(x,y,z,cx,cy,sc){
  x -= PAL.W/2;      // centre on pallet X midpoint
  z -= PAL.D/2;      // centre on pallet Z midpoint
  y -= camTargetY;   // centre on vertical midpoint of scene
  const sT=Math.sin(camTheta),cT=Math.cos(camTheta);
  const sP=Math.sin(camPhi),cP=Math.cos(camPhi);
  const rx=x*cT-z*sT,rz=x*sT+z*cT;
  const fx=rx,fy=y*cP-rz*sP,fz=y*sP+rz*cP;
  const pz=fz+camDist;
  return[(fx/pz)*camDist*sc+cx+panX,(-fy/pz)*camDist*sc+cy+panY,fz];
}

function col(hex,f){
  const c=parseInt(hex.replace('#',''),16);
  let r=(c>>16)&255,g=(c>>8)&255,b=c&255;
  if(f>=0){r=Math.min(255,r+(255-r)*f);g=Math.min(255,g+(255-g)*f);b=Math.min(255,b+(255-b)*f);}
  else{r=Math.max(0,r*(1+f));g=Math.max(0,g*(1+f));b=Math.max(0,b*(1+f));}
  return`rgb(${Math.round(r)},${Math.round(g)},${Math.round(b)})`;
}

function drawFace(verts,fill,stroke){
  ctx.beginPath();ctx.moveTo(verts[0][0],verts[0][1]);
  verts.slice(1).forEach(v=>ctx.lineTo(v[0],v[1]));
  ctx.closePath();ctx.fillStyle=fill;ctx.fill();ctx.strokeStyle=stroke;ctx.lineWidth=.7;ctx.stroke();
}

function drawBox(x,y,z,w,h,d,color,sc,cx,cy){
  const p=[
    [x,y,z],[x+w,y,z],[x+w,y+h,z],[x,y+h,z],
    [x,y,z+d],[x+w,y,z+d],[x+w,y+h,z+d],[x,y+h,z+d]
  ].map(([px,py,pz])=>proj(px,py,pz,cx,cy,sc));
  const avgZ=f=>f.reduce((s,v)=>s+v[2],0)/f.length;
  [
    {v:[p[3],p[2],p[6],p[7]],f:col(color,.38),s:'rgba(0,0,0,.18)'},
    {v:[p[4],p[5],p[6],p[7]],f:col(color,.16),s:'rgba(0,0,0,.18)'},
    {v:[p[0],p[3],p[7],p[4]],f:col(color,.06),s:'rgba(0,0,0,.18)'},
    {v:[p[1],p[2],p[6],p[5]],f:col(color,-.14),s:'rgba(0,0,0,.18)'},
    {v:[p[0],p[1],p[2],p[3]],f:col(color,-.26),s:'rgba(0,0,0,.18)'},
    {v:[p[0],p[1],p[5],p[4]],f:col(color,-.38),s:'rgba(0,0,0,.18)'},
  ].sort((a,b)=>avgZ(b.v)-avgZ(a.v)).forEach(f=>drawFace(f.v,f.f,f.s));
}

function drawPallet(sc,cx,cy){
  const {W,D,H}=PAL;
  for(let i=0;i<6;i++) drawBox(i*200,H-22,0,120,22,D,'#c8a86a',sc,cx,cy);
  [0,D/2-50,D-100].forEach(bz=>drawBox(0,0,bz,W,20,100,'#b8965a',sc,cx,cy));
  [0,W/2-50,W-100].forEach(bx=>[0,D/2-50,D-100].forEach(bz=>drawBox(bx,20,bz,100,72,100,'#9a6e38',sc,cx,cy)));
  [0,D/2-40,D-80].forEach(bz=>drawBox(0,92,bz,W,20,80,'#b8965a',sc,cx,cy));
}

function draw3D(res){
  const vw=document.getElementById('view3d');
  const W=vw.clientWidth,H=vw.clientHeight;
  const dpr=Math.min(devicePixelRatio,2);
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.scale(dpr,dpr);

  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#c8d8ea');g.addColorStop(1,'#8faec8');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  if(!res)return;

  const totalH=res.totalH||PAL.H+100;
  camTargetY=totalH/2; // camera looks at vertical midpoint of scene
  const maxDim=Math.max(PAL.W,PAL.D,totalH);
  const sc=(Math.min(W,H)*(window.innerWidth<760?.75:.7))/maxDim;
  const cx=W/2,cy=H/2; // screen centre; y is centred via camTargetY in proj

  // floor shadow
  const sh=[[0,0,0],[PAL.W,0,0],[PAL.W,0,PAL.D],[0,0,PAL.D]].map(([px,py,pz])=>proj(px,py,pz,cx,cy,sc));
  ctx.beginPath();sh.forEach((p,i)=>i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1]));
  ctx.closePath();ctx.fillStyle='rgba(0,0,0,.16)';ctx.fill();

  drawPallet(sc,cx,cy);

  // sort all boxes back→front
  [...res.placements].sort((a,b)=>
    proj(b.x+b.w/2,b.y+b.h/2,b.z+b.d/2,cx,cy,sc)[2]-
    proj(a.x+a.w/2,a.y+a.h/2,a.z+a.d/2,cx,cy,sc)[2]
  ).forEach(p=>drawBox(p.x,p.y,p.z,p.w,p.h,p.d,p.color,sc,cx,cy));

  // manual mode overlays
  if(mode==='manual'){
    if(manRemoveMode && manHoverRemoveIdx>=0 && manHoverRemoveIdx<manBoxes.length){
      // red highlight on the box about to be removed
      const b=manBoxes[manHoverRemoveIdx];
      ctx.globalAlpha=0.55;
      drawBox(b.x,b.y,b.z,b.w,b.h,b.d,'#e74c3c',sc,cx,cy);
      ctx.globalAlpha=1;
    } else if(!manRemoveMode && manGhostX!==null){
      const {fw,fd,lh}=manGetDims();
      const gy=manSurfAt(manGhostX,manGhostZ,fw,fd);
      ctx.globalAlpha=0.38;
      drawBox(manGhostX,gy,manGhostZ,fw,lh,fd,manSelPkg.color,sc,cx,cy);
      ctx.globalAlpha=1;
    }
  }

  // height line
  const [lx0,ly0]=proj(PAL.W+90,0,PAL.D/2,cx,cy,sc);
  const [lx1,ly1]=proj(PAL.W+90,res.totalH,PAL.D/2,cx,cy,sc);
  ctx.beginPath();ctx.moveTo(lx0,ly0);ctx.lineTo(lx1,ly1);
  ctx.strokeStyle='#1a3c5e';ctx.lineWidth=2.5;ctx.stroke();
  [[lx0,ly0],[lx1,ly1]].forEach(([tx,ty])=>{ctx.beginPath();ctx.moveTo(tx-6,ty);ctx.lineTo(tx+6,ty);ctx.strokeStyle='#1a3c5e';ctx.lineWidth=2;ctx.stroke();});
  const fs=Math.max(11,Math.min(15,W/28));
  ctx.fillStyle='#1a3c5e';ctx.font=`bold ${fs}px Segoe UI`;
  ctx.fillText(res.totalH+' mm',lx1+8,(ly0+ly1)/2+fs/3);

  document.getElementById('hintBar').textContent=window.innerWidth<760?'Dotyk: obracaj · 2 palce: zoom · przyciski: zoom/obrót':'Mysz: obracaj · Scroll: zoom · PPM: przesuń';
}

function buildLegend(res,mode){
  const leg=document.getElementById('legend');
  const usedIds=new Set(res.placements.map(p=>p.pkgId));
  let html='<div style="font-weight:700;margin-bottom:5px;">Legenda</div>';
  html+=`<div class="lr"><div class="ls" style="background:#c8a86a"></div>Europaleta 1200×800 mm</div>`;
  PKGS.filter(p=>usedIds.has(p.id)).forEach(p=>{
    const grp=res.groups?.find(g=>g.pkgId===p.id);
    const cnt=grp?grp.placed:res.count;
    html+=`<div class="lr"><div class="ls" style="background:${p.color}"></div>${p.name} ×${cnt}</div>`;
  });
  leg.innerHTML=html;
  leg.style.display='block';
}

// INIT
(function(){
  const vw=document.getElementById('view3d');
  const W=vw.clientWidth||window.innerWidth,H=vw.clientHeight||(window.innerHeight-50);
  canvas.width=W;canvas.height=H;
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#c8d8ea');g.addColorStop(1,'#8faec8');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(26,60,94,.7)';
  const fs=Math.max(13,Math.min(17,W/24));
  ctx.font=`${fs}px Segoe UI`;ctx.textAlign='center';
  ctx.fillText('Wybierz karton i naciśnij „Oblicz i wizualizuj"',W/2,H/2);
  ctx.textAlign='start';
})();

window.addEventListener('resize',()=>{if(lastRes)draw3D(lastRes);});

// Camera control buttons
const CAM_DEF={theta:0.52,phi:0.45,dist:3800};
function camZoomIn(){camDist=Math.max(600,camDist*0.8);if(lastRes)draw3D(lastRes);}
function camZoomOut(){camDist=Math.min(10000,camDist*1.25);if(lastRes)draw3D(lastRes);}
function camRotL(){camTheta-=0.18;if(lastRes)draw3D(lastRes);}
function camRotR(){camTheta+=0.18;if(lastRes)draw3D(lastRes);}
function camReset(){camTheta=CAM_DEF.theta;camPhi=CAM_DEF.phi;camDist=CAM_DEF.dist;panX=0;panY=0;camTargetY=PAL.H/2;if(lastRes)draw3D(lastRes);}
window.camZoomIn=camZoomIn;window.camZoomOut=camZoomOut;
window.camRotL=camRotL;window.camRotR=camRotR;window.camReset=camReset;
window.openPkgModal=openPkgModal;window.modalSave=modalSave;
window.modalDelete=modalDelete;window.modalClose=modalClose;
window.modalBgClick=modalBgClick;window.modalRestoreDefaults=modalRestoreDefaults;
</script>
